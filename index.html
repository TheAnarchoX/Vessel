<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VESSEL</title>
  <style>
    body {
      margin: 0;
      background: #0a0008;
      color: #e7d8c3;
      font-family: "Courier New", monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    canvas {
      width: min(100vw, calc(100vh * 16 / 9));
      height: min(100vh, calc(100vw * 9 / 16));
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 2px solid #2c0d1c;
      box-shadow: 0 0 24px #2c0d1c;
    }
  </style>
</head>
  <body>
  <canvas id="game" width="960" height="540"></canvas>
  <script src="src/core/fixedStep.js"></script>
  <script src="src/core/inputBindings.js"></script>
  <script src="src/core/playerOptions.js"></script>
  <script src="src/gameplay/feelMetrics.js"></script>
  <script src="src/gameplay/enemyContracts.js"></script>
  <script src="src/gameplay/bossHazards.js"></script>
  <script src="src/gameplay/bossStateMachine.js"></script>
  <script src="src/gameplay/bossReplay.js"></script>
  <script src="src/gameplay/itemSystem.js"></script>
  <script src="src/gameplay/dungeonGenerator.js"></script>
  <script src="src/content/schemas.js"></script>
  <script src="src/rendering/entityVisuals.js"></script>
  <script src="src/ui/corruptionHud.js"></script>
  <script src="src/ui/alertHud.js"></script>
  <script src="src/audio/corruptionAudio.js"></script>
  <script src="src/audio/audioBus.js"></script>
  <script src="src/presentation/entityVisuals.js"></script>
  <script src="src/presentation/corruptionEffects.js"></script>
  <script src="src/engine/runtime.js"></script>
  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    ctx.imageSmoothingEnabled = false;

    const W = 960, H = 540, TILE = 48, ROOM_W = 19, ROOM_H = 11;
    const ROOM_PX_W = ROOM_W * TILE, ROOM_PX_H = ROOM_H * TILE;
    const ROOM_X = (W - ROOM_PX_W) / 2, ROOM_Y = (H - ROOM_PX_H) / 2;
    const FLOOR_NAMES = ["The Nave", "The Catacombs", "The Ossuary", "The Pit"];
    const MOVE_TUNING = { accel: 1200, friction: 7.5 };
    const SHOT_INTENT_GRACE_MS = 120;
    const HIT_STOP_MS = 16;
    const HIT_STOP_CAP_MS = 24;
    const PREVIEW_AMOUNT_PRECISION = 2;
    const MAX_PREVIEW_LOGS = 8;
    const FEEL_EVAL_SHOT_INTERVAL = 4;
    const PHASE25_PANEL_WIDTH = 376;
    const PHASE25_PANEL_HEIGHT = 164;
    const PHASE25_PANEL_MARGIN = 14;
    const FEEL_TARGETS = { maxP95InputLatencyMs: 130, maxCadenceErrorRatio: 0.2, expectedCadenceMs: 1000 / 1.5, minSamples: 8 };
    const ITEM_TOOLTIP_RANGE = 110;
    const ITEM_PICKUP_RANGE = 38;
    const UI_TEXT_BASE = 13;
    const STORAGE_KEY_OPTIONS = "vessel_phase9_options";
    const STORAGE_KEY_BINDINGS = "vessel_phase9_bindings";

    const inputProfile = VesselCore.createInputBindings(loadBindingSnapshot());
    const playerOptions = VesselCore.createPlayerOptions(loadOptionsSnapshot());
    let pendingRebindAction = null;

    const keys = new Set(), pressed = new Set();
    addEventListener("keydown", (e) => {
      if (pendingRebindAction) {
        const rebound = inputProfile.rebind(pendingRebindAction, e.code);
        if (rebound) {
          pendingRebindAction = null;
          persistSettings();
          enqueueAlert("Binding updated", "info", 1.1);
        }
        e.preventDefault();
        return;
      }
      if (!keys.has(e.code)) pressed.add(e.code);
      keys.add(e.code);
      queueShotIntent(e.code, performance.now());
      if (shouldPreventDefault(e.code)) e.preventDefault();
      initAudio();
    });
    addEventListener("keyup", (e) => keys.delete(e.code));

    let audioCtx = null;
    let audioBus = null;
    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioBus = VesselAudio.createAudioBus(audioCtx);
      }
      applyAudioProfile();
    }
    function blip(f = 440, d = 0.08, type = "sine", g = 0.08, bus = "sfx", critical = false) {
      if (!audioBus) return;
      audioBus.playTone({ freq: f, durationSec: d, wave: type, gain: g, bus, critical });
    }
    function sfxFire(){ blip(900,0.05,"triangle",0.06,"sfx"); }
    function sfxHit(){ blip(250,0.05,"triangle",0.05,"sfx"); }
    function sfxDamage(){ blip(95,0.12,"sawtooth",0.1,"sfx", true); }
    function sfxUnlock(){ blip(120,0.2,"triangle",0.07,"ui"); }
    function sfxPickup(){ [220,262,330].forEach((f,i)=>setTimeout(()=>blip(f,0.11,"triangle",0.06,"ui"), i*75)); }
    function sfxBoss(){ blip(70,0.8,"sawtooth",0.08,"voice", true); }

    function loadOptionsSnapshot() {
      const storage = globalThis.localStorage;
      if (!storage) return null;
      try {
        return JSON.parse(storage.getItem(STORAGE_KEY_OPTIONS) || "null") || null;
      } catch (_) {
        return null;
      }
    }

    function loadBindingSnapshot() {
      const storage = globalThis.localStorage;
      if (!storage) return null;
      try {
        return JSON.parse(storage.getItem(STORAGE_KEY_BINDINGS) || "null") || null;
      } catch (_) {
        return null;
      }
    }

    function persistSettings() {
      const storage = globalThis.localStorage;
      if (!storage) return;
      storage.setItem(STORAGE_KEY_OPTIONS, JSON.stringify(playerOptions.get()));
      storage.setItem(STORAGE_KEY_BINDINGS, JSON.stringify(inputProfile.getBindings()));
    }

    function applyAudioProfile() {
      if (!audioBus) return;
      audioBus.setProfile(playerOptions.get().audioIntensity);
    }

    function shouldPreventDefault(code) {
      if (code === "Tab") return true;
      const bindings = inputProfile.getBindings();
      for (const actionId in bindings) if (bindings[actionId] === code) return true;
      return ["Escape", "F2", "F3", "F4", "F5", "F6", "F7", "BracketLeft", "BracketRight"].includes(code);
    }

    // Item pool now driven by VesselGameplay.ITEM_DEFINITIONS (src/gameplay/itemSystem.js)
    // Deterministic RNG for item offerings per dungeon
    let _itemRng = null;
    function resetItemRng(seed) { _itemRng = VesselGameplay.generateItemOffering ? (function(){ const s = (seed>>>0)||1; let st=s; return function(){ st=(1664525*st+1013904223)>>>0; return st/4294967296; }; })() : null; }
    const _runHistory = VesselGameplay.createRunHistory();

    function randomOf(a){ return a[(Math.random()*a.length)|0]; }
    function makePlayer() {
      return { x: W/2, y: H/2, vx: 0, vy: 0, accel: MOVE_TUNING.accel, friction: MOVE_TUNING.friction, r: 11, soul: 6, maxSoul: 6, corruption: 0, tears: 1.5, damage: 1, speed: 180, range: 400, shotSpeed: 320, damageReduction: 0, inv: 0, fireCd: 0, items: [], itemIds: [], extraLife: 0, pierce: false, slow: false, activeSynergies: [] };
    }

    function createObservedStateTracker() {
      return { player: new Set(), enemy: new Set(), item: new Set(), boss: new Set() };
    }
    function observePhase25State(group, state) {
      if (!state || !G.phase25Visuals?.observed?.[group]) return;
      G.phase25Visuals.observed[group].add(state);
    }
    function formatObservedStates(group) {
      const seen = G.phase25Visuals?.observed?.[group];
      if (!seen || seen.size === 0) return "none";
      return Array.from(seen).join("|");
    }

    const G = {
      state: "title", floor: 0, dungeon: null, room: null, player: null, shots: [], enemyShots: [],
      msg: "", msgT: 0, mapOpen: false, flash: 0, shake: 0, endingTitle: "", endingLine: "",
      hitStop: 0, shotIntent: null, feelMetrics: VesselGameplay.createFeelMetrics(), feelFailures: [],
      phase2Preview: null, phase25Visuals: { enabled: true, checklist: false, observed: createObservedStateTracker() },
      activeBoss: null, bossPhaseFlash: 0, bossReplaySession: null, bossInputLocked: false, bossDebugOverlay: false, itemDebugOverlay: false, showDebugHUD: false,
      nearbyItem: null, descentPortal: null, bossDropPending: false,
      alerts: VesselUI.createAlertState(),
      pauseMenuOpen: false,
      pauseCursor: 0,
      optionsMenuOpen: false,
      optionsCursor: 0,
      controlCursor: 0,
      cueFlags: { lowSoul: false, highCorruption: false, denseCombat: false }
    };

    const PAUSE_ROWS = ["Settings", "Restart", "Exit"];

    const MENU_ROWS = [
      "flashIntensity",
      "shakeIntensity",
      "textScale",
      "corruptionColorblindMode",
      "minimapMode",
      "audioIntensity",
      "subtitles",
      "tutorialHints",
      "controls",
    ];

    const CONTROL_ROWS = VesselCore.REBINDABLE_ACTIONS.slice();
    const ACTION_LABELS = {
      move_up: "Move Up",
      move_down: "Move Down",
      move_left: "Move Left",
      move_right: "Move Right",
      shoot_up: "Shoot Up",
      shoot_down: "Shoot Down",
      shoot_left: "Shoot Left",
      shoot_right: "Shoot Right",
      interact: "Interact",
      toggle_map: "Map Overlay",
      restart: "Restart Run",
    };

    function behaviorColor(behavior) {
      return {
        chase: "#9f3f46",
        charge: "#d26c4a",
        kite: "#8b5cb1",
        summon: "#659c5f",
        zone: "#4f829f",
      }[behavior] || "#9a8896";
    }
    function ensurePhase2Preview() {
      if (G.phase2Preview || !VesselGameplay.composeEncounter) return;
      const enemies = VesselGameplay.composeEncounter({ seed: 20260303, roomIntent: "boss", wave: 5 });
      const eliteModifiers = VesselGameplay.ELITE_MODIFIERS
        ? Object.keys(VesselGameplay.ELITE_MODIFIERS)
        : ["faster", "armored", "cursed", "berserk"];
      const behaviorTypes = Array.isArray(VesselGameplay.BEHAVIOR_TYPES)
        ? VesselGameplay.BEHAVIOR_TYPES
        : ["chase", "charge", "kite", "summon", "zone"];
      eliteModifiers.forEach((modifier, i) => {
        enemies.push(VesselGameplay.createEnemyBehaviorState({
          id: `elite-${modifier}`,
          behavior: behaviorTypes[i % behaviorTypes.length],
          modifier,
          x: ROOM_X + 180 + i * 70,
          y: ROOM_Y + ROOM_PX_H - 120,
        }));
      });
      G.phase2Preview = { enabled: false, enemies, logs: [] };
    }
    function updatePhase2Preview(dt) {
      if (!G.phase2Preview || !G.phase2Preview.enabled) return;
      const target = { id: "player", x: G.player.x, y: G.player.y };
      for (const enemy of G.phase2Preview.enemies) {
        const events = VesselGameplay.updateEnemyBehavior(enemy, { dtMs: dt * 1000, target });
        for (const event of events) {
          if (!event.window) continue;
          const amount = typeof event.amount === "number" ? `:${event.amount.toFixed(PREVIEW_AMOUNT_PRECISION)}` : "";
          G.phase2Preview.logs.unshift(`${event.behavior}/${event.window}/${event.source}${amount}`);
        }
      }
      if (G.phase2Preview.logs.length > MAX_PREVIEW_LOGS) G.phase2Preview.logs.length = MAX_PREVIEW_LOGS;
    }

    function dirForKey(code) {
      if (code === inputProfile.getBinding("shoot_up")) return { sx: 0, sy: -1 };
      if (code === inputProfile.getBinding("shoot_down")) return { sx: 0, sy: 1 };
      if (code === inputProfile.getBinding("shoot_left")) return { sx: -1, sy: 0 };
      if (code === inputProfile.getBinding("shoot_right")) return { sx: 1, sy: 0 };
      return null;
    }
    function queueShotIntent(code, nowMs) {
      const dir = dirForKey(code);
      if (!dir) return;
      G.shotIntent = { ...dir, at: nowMs };
    }
    function currentAimDirection() {
      const up = inputProfile.getBinding("shoot_up");
      const down = inputProfile.getBinding("shoot_down");
      const left = inputProfile.getBinding("shoot_left");
      const right = inputProfile.getBinding("shoot_right");
      if (up && keys.has(up)) return dirForKey(up);
      if (down && keys.has(down)) return dirForKey(down);
      if (left && keys.has(left)) return dirForKey(left);
      if (right && keys.has(right)) return dirForKey(right);
      return null;
    }

    function enqueueAlert(text, severity, durationSec) {
      VesselUI.pushAlert(G.alerts, text, severity || "info", durationSec || 1.6);
    }
    function readHeldAim(nowMs) {
      const aim = currentAimDirection();
      if (aim && !G.shotIntent) G.shotIntent = { ...aim, at: nowMs };
    }
    function isIntentHeld(intent) {
      const aim = currentAimDirection();
      return !!aim && aim.sx === intent.sx && aim.sy === intent.sy;
    }
    function firePlayerShot(intent, nowMs) {
      const p = G.player;
      // Corruption scaling for corruption-tech items
      const corrBonus = VesselGameplay.resolveCorruptionScaling(p);
      const effectiveDmg = p.damage + corrBonus.damage;
      const effectiveTears = p.tears + corrBonus.tears;
      p.fireCd = 1 / effectiveTears; sfxFire();
      const baseShot = {x:p.x,y:p.y,vx:intent.sx*p.shotSpeed,vy:intent.sy*p.shotSpeed,life:p.range/p.shotSpeed,damage:effectiveDmg,pierce:p.pierce,slow:p.slow,homing:p.homing,dot:p.dot||0,chain:p.chain||0,color:tearColor()};
      G.shots.push(baseShot);
      // Split: spawn extra angled projectiles
      if (p.split > 0) {
        for (let si = 1; si <= p.split; si++) {
          const spreadAngle = (si * 0.22);
          const cosA = Math.cos(spreadAngle), sinA = Math.sin(spreadAngle);
          G.shots.push({x:p.x,y:p.y,vx:baseShot.vx*cosA - baseShot.vy*sinA,vy:baseShot.vx*sinA + baseShot.vy*cosA,life:baseShot.life*0.8,damage:effectiveDmg*0.6,pierce:p.pierce,slow:p.slow,homing:p.homing,dot:p.dot||0,chain:p.chain||0,color:tearColor()});
          G.shots.push({x:p.x,y:p.y,vx:baseShot.vx*cosA + baseShot.vy*sinA,vy:-baseShot.vx*sinA + baseShot.vy*cosA,life:baseShot.life*0.8,damage:effectiveDmg*0.6,pierce:p.pierce,slow:p.slow,homing:p.homing,dot:p.dot||0,chain:p.chain||0,color:tearColor()});
        }
      }
      VesselGameplay.recordShot(G.feelMetrics, nowMs, intent.at, 1000 / effectiveTears);
      if ((G.feelMetrics.shotLatenciesMs.length % FEEL_EVAL_SHOT_INTERVAL) === 0) {
        const summary = VesselGameplay.summarizeFeel(G.feelMetrics);
        G.feelFailures = VesselGameplay.evaluateFeel(summary, FEEL_TARGETS);
      }
      G.shotIntent = isIntentHeld(intent) ? { sx: intent.sx, sy: intent.sy, at: nowMs } : null;
    }

    // createDungeon removed — replaced by VesselGameplay.generateValidDungeon (src/gameplay/dungeonGenerator.js)

    let _enemyUid = 0;
    function spawnEnemy(type, x, y) {
      const archetype = VesselGameplay.getEnemyArchetype ? VesselGameplay.getEnemyArchetype(type) : null;
      if (archetype) {
        return {
          type,
          behavior: archetype.behavior,
          pathAffinity: archetype.pathAffinity,
          x,
          y,
          _uid: ++_enemyUid,
          r: ["summon", "zone", "support", "disruptor"].includes(archetype.behavior) ? 16 : 14,
          hp: archetype.baseHealth,
          maxHp: archetype.baseHealth,
          speed: archetype.baseSpeed,
          damage: archetype.baseDamage || 1,
          color: archetype.color || "#9a8896",
          cd: Math.random() * 1.5,
          phase: 1,
          slowT: 0,
          hitT: 0,
          spawnT: 0.6,
          split: false,
          delay: [],
        };
      }
      const stat = {
        penitent:[2,60,0.5,"#89272d"], hollowed:[3,75,1,"#c7b39e"], wisp:[2,0,0.5,"#805ca0"],
        bonecrawler:[3,110,1,"#bcbaaa"], revenant:[6,55,1.5,"#7c7c7c"], plague:[4,50,1,"#4f7f45"],
        seraph:[5,85,1,"#ca8054"], choir:[3,65,1,"#8d5ca8"], tendril:[8,0,2,"#120814"],
        shepherd:[36,64,1,"#6a3a2b"], pit:[58,88,1.5,"#170812"]
      }[type];
      return { type, x, y, _uid: ++_enemyUid, r: (type==="shepherd"||type==="pit")?36:(type==="tendril"?22:14), hp: stat[0], maxHp: stat[0], speed: stat[1], damage: stat[2], color: stat[3], cd: Math.random()*1.5, phase: 1, slowT: 0, hitT: 0, spawnT: 0.6, split:false, delay:[] };
    }
    function enemyTypeForFloor() {
      if (VesselGameplay.ENEMY_ROSTER) {
        const pools = [
          ["penitent", "flagellant", "wisp", "cantor", "hollowed"],
          ["bonecrawler", "revenant", "sigilist", "chorister", "lancer"],
          ["seraph", "vesper_guard", "plague", "soul_archer", "acolyte"],
          ["gore_ram", "heretic", "obscurer", "maggot", "dread_hound"],
        ];
        return randomOf(pools[Math.max(0, Math.min(pools.length - 1, G.floor))]);
      }
      if (G.floor===0) return randomOf(["penitent","hollowed","wisp"]);
      if (G.floor===1) return randomOf(["bonecrawler","revenant","plague"]);
      if (G.floor===2) return randomOf(["seraph","choir","tendril"]);
      return randomOf(["seraph","hollowed","penitent"]);
    }

    function resolveRouteAffinity() {
      const c = G.player?.corruption || 0;
      if (c >= 60) return "demonic";
      if (c <= 30) return "ascetic";
      return "unaligned";
    }

    function createOptionPedestal(name, subtitle, description, optionType, x, y) {
      return {
        x,
        y,
        optionType,
        spawnT: 0.5,
        item: {
          name,
          subtitle,
          desc: description,
        },
      };
    }

    function createRestRoomOptions() {
      return [
        createOptionPedestal(
          "COMMUNE",
          "Restore vitality",
          "+2 SOUL",
          "rest_commune",
          W / 2 - 90,
          H / 2,
        ),
        createOptionPedestal(
          "VIGIL",
          "Steady your vessel",
          "+1 MAX SOUL, +1 SOUL",
          "rest_vigil",
          W / 2 + 90,
          H / 2,
        ),
      ];
    }

    function createConfessionRoomOptions() {
      return [
        createOptionPedestal(
          "WRATH",
          "Strike first",
          "+1 DAMAGE, -1 SOUL",
          "confession_wrath",
          W / 2 - 90,
          H / 2,
        ),
        createOptionPedestal(
          "PENANCE",
          "Bend the flesh",
          "+2 MAX SOUL, +2 SOUL, +15 CORRUPTION",
          "confession_penance",
          W / 2 + 90,
          H / 2,
        ),
      ];
    }

    function applyOptionPickup(pck) {
      const p = G.player;
      if (!pck || !pck.optionType) return false;

      if (pck.optionType === "rest_commune") {
        p.soul = Math.min(p.maxSoul, p.soul + 2);
        setMsg("RESTORED", 1.8);
        return true;
      }
      if (pck.optionType === "rest_vigil") {
        p.maxSoul += 1;
        p.soul = Math.min(p.maxSoul, p.soul + 1);
        setMsg("VIGIL ACCEPTED", 1.8);
        return true;
      }
      if (pck.optionType === "confession_wrath") {
        p.damage += 1;
        p.soul = Math.max(1, p.soul - 1);
        G.room.choiceDone = true;
        G.room.cleared = true;
        setMsg("THE CONFESSION IS ACCEPTED", 2);
        return true;
      }
      if (pck.optionType === "confession_penance") {
        p.maxSoul += 2;
        p.soul = Math.min(p.maxSoul, p.soul + 2);
        p.corruption = Math.min(100, p.corruption + 15);
        G.room.choiceDone = true;
        G.room.cleared = true;
        setMsg("THE CONFESSION IS ACCEPTED", 2);
        return true;
      }
      return false;
    }

    function enterRoom() {
      G.room.visited = true; G.shots = []; G.enemyShots = [];
      if (G.room.type !== "boss") { G.activeBoss = null; G.bossInputLocked = false; G.bossReplaySession = null; G.bossPhaseFlash = 0; }
      if (!G.room.spawned) {
        G.room.spawned = true;
        if (G.room.type==="combat") for (let i=0;i<2+G.floor;i++) G.room.enemies.push(spawnEnemy(enemyTypeForFloor(), ROOM_X+130+Math.random()*(ROOM_PX_W-260), ROOM_Y+120+Math.random()*(ROOM_PX_H-240)));
        if (G.room.type==="boss") {
          const bossType = VesselGameplay.selectBossForFloor
            ? VesselGameplay.selectBossForFloor(G.floor, ((G.runSeed || 1) + G.room.x * 37 + G.room.y * 53) >>> 0)
            : (G.floor===3?"pit":G.floor===2?"choir":"shepherd");
          const def = VesselGameplay.BOSS_DEFINITIONS[bossType];
          if (def) {
            const boss = VesselGameplay.createBossState(def, W/2, H/2-40, G.floor*1000+7);
            G.activeBoss = boss;
            G.bossInputLocked = boss.inputLocked;
            G.bossPhaseFlash = 0;
            G.room.enemies.push(boss);
            if (VesselGameplay.createBossReplaySession) {
              G.bossReplaySession = VesselGameplay.createBossReplaySession(bossType, G.floor*1000+7, {x:G.player.x,y:G.player.y,r:G.player.r});
            }
          } else {
            G.room.enemies.push(spawnEnemy(bossType,W/2,H/2-40));
          }
          sfxBoss();
        }
        if (G.room.type==="altar") {
          const offered = VesselGameplay.generateItemOffering(_itemRng, G.player.itemIds, 2);
          VesselGameplay.trackOffer(_runHistory, offered);
          G.room.pickups = offered.map((id, i) => {
            const def = VesselGameplay.getItemDef(id);
            return { x: W/2 - 90 + i * 180, y: H/2, itemId: id, item: def, spawnT: 0.5 };
          });
        }
        if (G.room.type==="reliquary") {
          const relCount = G.player.extraPickup ? 2 : 1;
          const offered = VesselGameplay.generateItemOffering(_itemRng, G.player.itemIds, relCount);
          VesselGameplay.trackOffer(_runHistory, offered);
          G.room.pickups = offered.map((id, i) => {
            const def = VesselGameplay.getItemDef(id);
            return { x: ROOM_X+ROOM_PX_W-110, y: H/2 - 40 + i * 80, itemId: id, item: def, hidden: true, spawnT: 0.5 };
          });
        }
        if (G.room.type === "rest") {
          G.room.pickups = createRestRoomOptions();
        }
        if (G.room.type === "confession") {
          G.room.pickups = createConfessionRoomOptions();
        }
      }
    }
    function roomLocked(){ return !G.room.cleared && (G.room.type==="combat"||G.room.type==="boss"); }
    function setMsg(text, t = 2, severity = "info") {
      G.msg = text;
      G.msgT = t;
      enqueueAlert(text, severity, t);
    }

    function mutateOption(rowId, dir) {

          e.x=p.x+Math.cos(e.a)*orbit; e.y=p.y+Math.sin(e.a)*orbit;
          if (e.cd<=0) { e.cd=e.type==="seraph"?0.9:1.2; G.enemyShots.push({x:e.x,y:e.y,vx:(dx/d)*180,vy:(dy/d)*180,life:2.5,color:"#a33",damage:e.damage}); }
        } else if (e.type==="tendril") {
          if (e.cd<=0 && d<68) { damagePlayer(e.damage); e.cd=1.2; }
        }
        e.x=Math.max(l+e.r,Math.min(r-e.r,e.x)); e.y=Math.max(t+e.r,Math.min(b-e.r,e.y));
        if (!["wisp","seraph"].includes(e.type) && Math.hypot(e.x-p.x,e.y-p.y)<e.r+p.r) damagePlayer(e.damage);
        if (e.hp<=0 && e.type==="plague" && !e.split) { e.split=true; for (let k=0;k<3;k++) es.push(spawnEnemy("penitent",e.x+Math.random()*40-20,e.y+Math.random()*40-20)); }
      }

      // --- Room clear check (boss uses dead flag or hp<=0) ---
      if (!G.room.cleared && G.room.enemies.length && G.room.enemies.every(e => e.hp <= 0 || (e === G.activeBoss && (e.dead || e.hp <= 0)))) {
        G.room.cleared = true; sfxUnlock(); setMsg("ROOM PURGED",1.5);
        // Soul on clear from economy items
        if (G.player.soulOnClear) { G.player.soul = Math.min(G.player.maxSoul, G.player.soul + G.player.soulOnClear); }
        if (G.room.type==="boss") {
          G.activeBoss = null; G.bossReplaySession = null;
          if (G.floor===3) {
            const c=p.corruption; G.state="ending";
            G.endingTitle = c<50 ? "ENDING A — EXORCISM" : "ENDING B — SACRIFICE";
            G.endingLine = c<50 ? "You cast it out. You are empty now. That might be okay." : "You won. The vessel remains. Something wears it home.";
          } else {
            const dropId = G.floor===0 ? "shepherds_brand" : G.floor===1 ? "saints_marrow" : "testament";
            const def = VesselGameplay.getItemDef(dropId);
            G.room.pickups = [{ x: W/2, y: H/2, itemId: dropId, item: def, spawnT: 0.5, bossDrop: true }];
            G.bossDropPending = false;
            G.descentPortal = { x: W/2, y: H/2 + 70, spawnT: 0.6 };
            setMsg("A PASSAGE OPENS BELOW", 3);
          }
        }
      }

      // --- Walk-over item pickup (proximity-based) ---
      G.nearbyItem = null;
      for (const pck of G.room.pickups) {
        if (pck.taken || pck.hidden) continue;
        const dist = Math.hypot(p.x - pck.x, p.y - pck.y);
        if (dist < ITEM_TOOLTIP_RANGE) G.nearbyItem = pck;
        if (dist < ITEM_PICKUP_RANGE) {
          observePhase25State("item", "pickup");
          const usedOption = applyOptionPickup(pck);
          if (!usedOption) applyItemById(pck.itemId);
          pck.taken = true;
          if (G.room.type === "altar") {
            G.player.soul = Math.max(1, G.player.soul - 0.5);
          }
          if (G.room.type === "altar" || G.room.type === "rest" || G.room.type === "confession") {
            for (const other of G.room.pickups) if (other !== pck) other.taken = true;
          }
          if (pck.bossDrop) {
            G.bossDropPending = false;
          }
          break;
        }
      }
      // Reliquary reveal on proximity
      if (G.room.type === "reliquary") {
        for (const rp of G.room.pickups) {
          if (rp.hidden && !rp.taken && p.x > ROOM_X + ROOM_PX_W - TILE * 2.5 && Math.abs(p.y - rp.y) < 64) rp.hidden = false;
        }
      }
      // Descent portal (shown immediately after boss kill)
      if (G.descentPortal) {
        G.descentPortal.spawnT = Math.max(0, G.descentPortal.spawnT - dt);
        if (G.descentPortal.spawnT <= 0 && Math.hypot(p.x - G.descentPortal.x, p.y - G.descentPortal.y) < 36) {
          G.descentPortal = null;
          G.floor++; loadFloor();
        }
      }
      if (p.corruption>=100 && G.floor===3 && G.room.type==="boss") {
        G.state = "ending";
        G.endingTitle = "ENDING C — CONSUMED";
        G.endingLine = "There was no player. There was only ever the vessel.";
        VesselGameplay.endRunTracking(_runHistory, G.player, "consumed");
      }
      evaluateCriticalCues();
      updatePhase2Preview(dt);
    }

    function update(dt){
      if (G.state==="title") { if (pressed.has("Enter")) startRun(); }
      else if (G.state==="playing") { if (inputProfile.wasActionPressed(pressed, "restart")) startRun(); else updatePlaying(dt); }
      else if (G.state==="dead"||G.state==="ending") { if (pressed.has("Enter")) G.state="title"; else if (inputProfile.wasActionPressed(pressed, "restart")) startRun(); }
      G.msgT = Math.max(0, G.msgT-dt);
      const opt = playerOptions.get();
      G.flash = Math.max(0,G.flash-dt*2.5*opt.flashIntensity);
      G.shake = Math.max(0,G.shake-dt*8*Math.max(0.25,opt.shakeIntensity));
      VesselUI.tickAlerts(G.alerts, dt);
      pressed.clear();
    }

    function drawRoom() {
      const palette = [
        {floor:"#14000f",wall:"#300b19",alt:"#22030e"},
        {floor:"#120b07",wall:"#2d1e13",alt:"#1f140e"},
        {floor:"#0d0a10",wall:"#1f1427",alt:"#17101f"},
        {floor:"#090006",wall:"#25001d",alt:"#160010"}
      ][G.floor];
      ctx.fillStyle = palette.floor; ctx.fillRect(ROOM_X,ROOM_Y,ROOM_PX_W,ROOM_PX_H);
      for (let y=1;y<ROOM_H-1;y++) for (let x=1;x<ROOM_W-1;x++) {
        ctx.fillStyle = ((x+y)&1)?palette.floor:palette.alt;
        ctx.fillRect(ROOM_X+x*TILE,ROOM_Y+y*TILE,TILE,TILE);
      }
      ctx.fillStyle = palette.wall;
      ctx.fillRect(ROOM_X,ROOM_Y,ROOM_PX_W,TILE); ctx.fillRect(ROOM_X,ROOM_Y+ROOM_PX_H-TILE,ROOM_PX_W,TILE);
      ctx.fillRect(ROOM_X,ROOM_Y,TILE,ROOM_PX_H); ctx.fillRect(ROOM_X+ROOM_PX_W-TILE,ROOM_Y,TILE,ROOM_PX_H);
      const d = (x,y,w,h)=>{ ctx.fillStyle = roomLocked() ? "#17070f" : "#422738"; ctx.fillRect(x,y,w,h); };
      if (G.room.doors.u) d(W/2-56,ROOM_Y,112,TILE);
      if (G.room.doors.d) d(W/2-56,ROOM_Y+ROOM_PX_H-TILE,112,TILE);
      if (G.room.doors.l) d(ROOM_X,H/2-56,TILE,112);
      if (G.room.doors.r) d(ROOM_X+ROOM_PX_W-TILE,H/2-56,TILE,112);
      // Door room-type indicators (show what's on the other side — always visible for path choice)
      if (!roomLocked()) {
        const doorTypeColors = { boss:"#9f3040", altar:"#c9a030", confession:"#4070a0", reliquary:"#408050", rest:"#5a8a5a", combat:"#5a3a48", start:"#5a3a48" };
        const doorTypeLabels = { boss:"BOSS", altar:"ALTAR", confession:"???", reliquary:"RELIQUARY", rest:"REST", combat:"COMBAT" };
        const drawDoorLabel = (x, y, type, visited) => {

          ctx.fillStyle = doorTypeColors[type] || "#5a3a48"; ctx.font = "9px monospace";
          ctx.fillText(lbl, x - ctx.measureText(lbl).width / 2, y);
          ctx.globalAlpha = 1.0;
        };
        if (G.room.doors.u) { const nr = G.dungeon.grid[G.room.y-1]?.[G.room.x]; if (nr) drawDoorLabel(W/2, ROOM_Y + TILE - 4, nr.type, nr.visited); }
        if (G.room.doors.d) { const nr = G.dungeon.grid[G.room.y+1]?.[G.room.x]; if (nr) drawDoorLabel(W/2, ROOM_Y + ROOM_PX_H - 6, nr.type, nr.visited); }
        if (G.room.doors.l) { const nr = G.dungeon.grid[G.room.y]?.[G.room.x-1]; if (nr) drawDoorLabel(ROOM_X + TILE/2, H/2 - 60, nr.type, nr.visited); }
        if (G.room.doors.r) { const nr = G.dungeon.grid[G.room.y]?.[G.room.x+1]; if (nr) drawDoorLabel(ROOM_X + ROOM_PX_W - TILE/2, H/2 - 60, nr.type, nr.visited); }
      }
    }
    function drawHUD() {
      const p = G.player;
      const opt = playerOptions.get();
      const textScale = opt.textScale;
      const hudLabelSize = Math.round(UI_TEXT_BASE * textScale);
      ctx.fillStyle="#12000f"; ctx.fillRect(0,0,W,ROOM_Y); ctx.fillRect(0,ROOM_Y+ROOM_PX_H,W,H-ROOM_Y-ROOM_PX_H);
      ctx.fillRect(0,0,ROOM_X,H); ctx.fillRect(ROOM_X+ROOM_PX_W,0,W-ROOM_X-ROOM_PX_W,H);
      // --- SOUL meter (top-left, row 1) ---
      ctx.fillStyle="#e6d8cc"; ctx.font = hudLabelSize + "px monospace";
      ctx.fillText("SOUL:",16,20);
      const pulse = 1 + Math.sin(performance.now()*0.008)*0.08;
      for (let i=0;i<Math.ceil(p.maxSoul);i++) {
        const full=i+1<=p.soul, half=!full&&i<p.soul;
        const z=(full||half)&&p.soul<=2?9*pulse:9;
        ctx.fillStyle="#3a1f24"; ctx.fillRect(66+i*13,12,9,9);
        if (full) { ctx.fillStyle="#d54a58"; ctx.fillRect(66+i*13,12,z,z); }
        else if (half) { ctx.fillStyle="#d54a58"; ctx.fillRect(66+i*13,12,z/2,z); }
      }
      // --- CORRUPTION meter (top-left, row 2, below SOUL) ---
      const corruptionHud = VesselCore.getCorruptionHudColors(p.corruption, opt.corruptionColorblindMode);
      ctx.fillStyle="#e6d8cc"; ctx.font = hudLabelSize + "px monospace";
      ctx.fillText(`CORRUPTION: ${Math.round(p.corruption)}%`,16,36);
      ctx.fillStyle="#281118"; ctx.fillRect(16,40,180,6);
      ctx.fillStyle = corruptionHud.fill; ctx.fillRect(16,40,180*Math.min(1,p.corruption/100),6);
      ctx.fillStyle = corruptionHud.text;
      ctx.font = Math.round(10 * textScale) + "px monospace";
      ctx.fillText(corruptionHud.label, 204, 46);
      // --- Title (center) ---
      ctx.fillStyle="#c9b65d"; ctx.font = Math.round(16 * textScale) + "px monospace"; ctx.fillText("VESSEL",W/2-30,18);
      // --- Bottom bar ---
      ctx.fillStyle="#d8d0c2"; ctx.font = Math.round(16 * textScale) + "px monospace";
      ctx.fillText(`FLOOR: ${FLOOR_NAMES[G.floor]}`,W-225,H-28);
      if (G.showDebugHUD) {
        ctx.font="11px monospace";
        ctx.fillStyle = G.phase2Preview?.enabled ? "#d4be6c" : "#7e6a76";
        ctx.fillText(`F3 PREVIEW ${G.phase2Preview?.enabled ? "ON" : "OFF"}`,W/2-80,40);
        ctx.fillStyle = G.bossDebugOverlay ? "#d4be6c" : "#7e6a76";
        ctx.fillText(`F6 BOSS ${G.bossDebugOverlay ? "ON" : "OFF"}`,W/2+50,40);
        ctx.fillStyle = G.itemDebugOverlay ? "#d4be6c" : "#7e6a76";
        ctx.fillText(`F7 ITEMS ${G.itemDebugOverlay ? "ON" : "OFF"}`,W/2+170,40);
        ctx.fillStyle = G.phase25Visuals.enabled ? "#8acb8a" : "#a98989";
        ctx.fillText(`F4 VISUAL ${G.phase25Visuals.enabled ? "ON" : "LEGACY"} / F5 CHECKLIST ${G.phase25Visuals.checklist ? "ON" : "OFF"}`,W/2-160,H-10);
        ctx.font="16px monospace";
        const feelSummary = VesselGameplay.summarizeFeel(G.feelMetrics);
        ctx.fillStyle = G.feelFailures.length ? "#d87070" : "#8acb8a";
        ctx.fillText(`FEEL ${G.feelFailures.length ? "REGRESSED" : "OK"} L95:${feelSummary.latencyP95Ms.toFixed(0)}ms`,W/2-130,H-28);
      }
      // --- Minimap (top-right with semi-transparent background) ---
      const miniRoomColors = { boss:"#9f3040", altar:"#c9a030", confession:"#4070a0", reliquary:"#408050", start:"#6d4a58", combat:"#8b6d7c", rest:"#5a8a5a" };
      const miniRoomLabels = { boss:"B", altar:"A", confession:"?", reliquary:"R", start:"S", rest:"H" };
      const mapMode = opt.minimapMode;
      const mapScale = mapMode === "tactical_plus" ? 1.55 : 1;
      const miniTileAlpha = mapMode === "tactical_plus" ? 0.62 : 1;
      // Build fog-of-war: only show rooms that are visited or adjacent to a visited room via doors
      const knownRooms = new Set();
      if (mapMode === "minimal") {
        knownRooms.add(G.room);
      } else {
        for (const r of G.dungeon.rooms) {
          const isKnown = r.visited || p.mapReveal;
          if (isKnown) {
            knownRooms.add(r);
            // Reveal adjacent rooms through doors (discovered but not visited)
            if (r.doors.u) { const nr = G.dungeon.grid[r.y-1]?.[r.x]; if (nr) knownRooms.add(nr); }
            if (r.doors.d) { const nr = G.dungeon.grid[r.y+1]?.[r.x]; if (nr) knownRooms.add(nr); }
            if (r.doors.l) { const nr = G.dungeon.grid[r.y]?.[r.x-1]; if (nr) knownRooms.add(nr); }
            if (r.doors.r) { const nr = G.dungeon.grid[r.y]?.[r.x+1]; if (nr) knownRooms.add(nr); }
          }
        }
      }
      // Compute minimap bounds from known rooms only
      let minRX = Infinity, minRY = Infinity, maxRX = -Infinity, maxRY = -Infinity;
      for (const r of knownRooms) {
        if (r.x < minRX) minRX = r.x; if (r.y < minRY) minRY = r.y;
        if (r.x > maxRX) maxRX = r.x; if (r.y > maxRY) maxRY = r.y;
      }
      if (!Number.isFinite(minRX)) return;
      const miniTile = Math.round(12 * mapScale), miniGap = Math.round(2 * mapScale), miniPad = Math.round(8 * mapScale);
      const miniStep = miniTile + miniGap;
      const miniW = (maxRX - minRX + 1) * miniStep - miniGap + miniPad * 2;
      const miniH = (maxRY - minRY + 1) * miniStep - miniGap + miniPad * 2;
      const miniOriginX = W - miniW - 10;
      const miniOriginY = 8;
      // Semi-transparent background
      ctx.fillStyle = mapMode === "tactical_plus" ? "rgba(8,2,12,0.34)" : "rgba(8,2,12,0.55)";
      ctx.fillRect(miniOriginX, miniOriginY, miniW, miniH);
      ctx.strokeStyle = "rgba(60,30,50,0.5)";
      ctx.strokeRect(miniOriginX, miniOriginY, miniW, miniH);
      // Draw only known rooms with 3-state differentiation
      for (const r of knownRooms) {
        const x = miniOriginX + miniPad + (r.x - minRX) * miniStep;
        const y = miniOriginY + miniPad + (r.y - minRY) * miniStep;
        const isCurrent = r === G.room;
        const visited = r.visited || p.mapReveal;
        const needsClear = r.type === "combat" || r.type === "boss";
        const cleared = needsClear ? r.cleared : visited;
        if (isCurrent) {
          // Current room: bright highlight
          ctx.globalAlpha = mapMode === "tactical_plus" ? 0.9 : 1;
          ctx.fillStyle = "#f0d477";
        } else if (cleared) {
          // Completed: full brightness color
          ctx.globalAlpha = miniTileAlpha;
          ctx.fillStyle = miniRoomColors[r.type] || "#8b6d7c";
        } else if (visited) {
          // Explored but not cleared: dim version
          const baseColor = miniRoomColors[r.type];
          if (baseColor) {
            ctx.globalAlpha = 0.45 * miniTileAlpha;
            ctx.fillStyle = baseColor;
          } else {
            ctx.globalAlpha = miniTileAlpha;
            ctx.fillStyle = "#3d2a35";
          }
        } else {
          // Discovered (adjacent) but not visited: show type color dimmed
          const discColor = miniRoomColors[r.type];
          if (discColor) {
            ctx.globalAlpha = 0.3 * miniTileAlpha;
            ctx.fillStyle = discColor;
          } else {
            ctx.globalAlpha = miniTileAlpha;
            ctx.fillStyle = "#1a0e15";
          }
        }
        ctx.fillRect(x, y, miniTile, miniTile);
        ctx.globalAlpha = 1.0;
        // Labels for visited AND discovered rooms
        if (miniRoomLabels[r.type]) {
          if (isCurrent) {
            ctx.fillStyle = "#1a0a08";
          } else if (visited) {
            ctx.fillStyle = cleared ? "#d8d0c2" : "#8a7a82";
          } else {
            ctx.fillStyle = "#5a4a52";
          }
          ctx.font = "7px monospace";
          ctx.fillText(miniRoomLabels[r.type], x + 2, y + 9);
        }
        // Connections (only from visited rooms)
        if (visited || isCurrent) {
          ctx.strokeStyle = cleared ? "#3a2030" : "#251520"; ctx.lineWidth = 1;
          if (r.doors.r && G.dungeon.grid[r.y]?.[r.x+1] && knownRooms.has(G.dungeon.grid[r.y][r.x+1])) { ctx.beginPath(); ctx.moveTo(x+miniTile,y+miniTile/2); ctx.lineTo(x+miniStep,y+miniTile/2); ctx.stroke(); }
          if (r.doors.d && G.dungeon.grid[r.y+1]?.[r.x] && knownRooms.has(G.dungeon.grid[r.y+1][r.x])) { ctx.beginPath(); ctx.moveTo(x+miniTile/2,y+miniTile); ctx.lineTo(x+miniTile/2,y+miniStep); ctx.stroke(); }
        }
      }
      VesselUI.renderAlert(ctx, G.alerts, ROOM_X + 20, ROOM_Y - Math.round(34 * textScale), 390, textScale);
      if (opt.tutorialHints) {
        const hint = "Esc Pause | [ ] Minimap Mode | Tab Map";
        ctx.fillStyle = "#7f6a78";
        ctx.font = Math.round(10 * textScale) + "px monospace";
        ctx.fillText(hint, ROOM_X + 10, H - 8);
      }
      if (G.msgT>0) { ctx.save(); ctx.globalAlpha=Math.min(1,G.msgT); ctx.font="bold 22px monospace"; ctx.fillStyle="#f0dfbf"; ctx.fillText(G.msg,W/2-ctx.measureText(G.msg).width/2,ROOM_Y+TILE+46); ctx.restore(); }
    }

    function drawPlaying() {
      const presentation = globalThis.VesselPresentation;
      const usePresentation = G.phase25Visuals.enabled && presentation;
      const nowMs = performance.now();
      drawRoom();
      for (const p of G.room.pickups) {
        // Always draw pedestal base
        if (usePresentation && !p.taken) observePhase25State("item", presentation.renderPickup(ctx, p, nowMs));
        else if (!p.taken) {
          ctx.fillStyle="#2d1f12"; ctx.fillRect(p.x-14,p.y+8,28,8);
          ctx.fillStyle="#f2e4bf"; ctx.fillRect(p.x-10,p.y-18,20,28);
        }
        // Empty pedestal base when item is taken
        if (p.taken) {
          ctx.fillStyle="#2d1f12"; ctx.fillRect(p.x-14,p.y+8,28,8);
          ctx.fillStyle="#1a130c"; ctx.fillRect(p.x-10,p.y-6,20,16);
        }
        if (p.item && !p.hidden && !p.taken) { ctx.fillStyle="#e8c95e"; ctx.font="12px monospace"; ctx.fillText(p.item.name,p.x-ctx.measureText(p.item.name).width/2,p.y-24); }
      }
      // Confession room visual cue now points at pedestal choice interaction.
      if (G.room.type === "confession" && !G.room.choiceDone) {
        ctx.fillStyle = "#4070a0"; ctx.font = "11px monospace";
        ctx.fillText("CHOOSE A CONFESSION PEDESTAL", W/2 - 104, ROOM_Y + ROOM_PX_H - TILE - 16);
      }
      if (G.room.type === "confession" && G.room.choiceDone) {
        ctx.fillStyle = "#3a2840"; ctx.font = "12px monospace";
        ctx.fillText("THE CONFESSION IS SEALED", W/2 - 100, H/2);
      }
      // Descent portal after boss drop
      if (G.descentPortal && G.descentPortal.spawnT <= 0) {
        const dp = G.descentPortal;
        const pulse = Math.sin(nowMs * 0.005) * 0.15 + 0.85;
        ctx.fillStyle = `rgba(80,20,50,${0.6 * pulse})`; ctx.beginPath(); ctx.arc(dp.x, dp.y, 28, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = `rgba(180,60,90,${0.4 * pulse})`; ctx.beginPath(); ctx.arc(dp.x, dp.y, 16, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle="#d8a0b0"; ctx.font="11px monospace"; ctx.fillText("DESCEND", dp.x-24, dp.y-34);
      }
      for (const s of G.shots) {
        if (usePresentation) presentation.renderProjectile(ctx, s);
        else { ctx.fillStyle=s.color; ctx.fillRect(s.x-4,s.y-4,8,8); }
      }
      for (const s of G.enemyShots) {
        if (usePresentation) presentation.renderProjectile(ctx, s);
        else { ctx.fillStyle=s.color||"#a33"; ctx.fillRect(s.x-4,s.y-4,8,8); }
      }
      // Render hazards below enemies
      if (G.activeBoss && G.activeBoss.activeHazards && usePresentation && presentation.renderHazard) {
        for (const h of G.activeBoss.activeHazards) presentation.renderHazard(ctx, h, nowMs);
      }
      for (const e of G.room.enemies) if (e.hp>0) {
        // Burn (dot) glow on burning enemies
        if (e.dotT > 0) {
          const burnAlpha = Math.min(0.6, e.dotT * 0.2);
          ctx.fillStyle = `rgba(220,100,20,${burnAlpha})`; ctx.beginPath(); ctx.arc(e.x, e.y, e.r + 4, 0, Math.PI*2); ctx.fill();
        }
        const isBoss = e.type==="shepherd"||e.type==="pit"||e.type==="choir";
        // Jitter offset for non-boss enemies so stacked ones are visible
        const jx = isBoss ? 0 : ((e._uid * 7) % 11) - 5;
        const jy = isBoss ? 0 : ((e._uid * 13) % 9) - 4;
        const ex = e.x + jx, ey = e.y + jy;
        if (usePresentation) { const prev = {x:e.x,y:e.y}; e.x=ex; e.y=ey; observePhase25State(isBoss ? "boss" : "enemy", presentation.renderEnemy(ctx, e, nowMs)); e.x=prev.x; e.y=prev.y; }
        else {
          ctx.fillStyle=e.color;
          if (["wisp","seraph"].includes(e.type)) { ctx.beginPath(); ctx.arc(ex,ey,e.r,0,Math.PI*2); ctx.fill(); }
          else if (e.type==="tendril") ctx.fillRect(ex-8,ey-20,16,40);
          else ctx.fillRect(ex-e.r*0.6,ey-e.r*0.7,e.r*1.2,e.r*1.4);
        }
        if (isBoss) {
          const bossNames = {shepherd:"THE SHEPHERD",pit:"THE PIT",choir:"THE CHOIR"};
          ctx.fillStyle="#d8c6b8"; ctx.font="12px monospace";
          const bname = bossNames[e.type] || e.type.toUpperCase();
          ctx.fillText(bname, W/2 - ctx.measureText(bname).width/2, ROOM_Y+TILE+16);
          ctx.fillStyle="#2a0010"; ctx.fillRect(W/2-140,ROOM_Y+TILE+22,280,8);
          ctx.fillStyle="#bf4b54"; ctx.fillRect(W/2-140,ROOM_Y+TILE+22,280*Math.max(0,e.hp/e.maxHp),8);
          if (e.phaseId && e.phaseId[0] !== '_') { ctx.fillStyle="#8a6a72"; ctx.font="10px monospace"; ctx.fillText(e.phaseId.toUpperCase(), W/2+150, ROOM_Y+TILE+30); }
        }
      }
      // Phase transition flash
      if (G.bossPhaseFlash > 0 && G.activeBoss && usePresentation && presentation.renderBossPhaseFlash) {
        presentation.renderBossPhaseFlash(ctx, G.activeBoss, G.bossPhaseFlash, nowMs);
      }
      // Boss debug overlay (F6)
      if (G.bossDebugOverlay && G.activeBoss && VesselGameplay.getBossDebugOverlay) {
        const dbg = VesselGameplay.getBossDebugOverlay(G.activeBoss);
        ctx.fillStyle = "rgba(10,2,12,0.86)"; ctx.fillRect(ROOM_X + 14, ROOM_Y + 30, 340, 120);
        ctx.strokeStyle = "#6d4a58"; ctx.strokeRect(ROOM_X + 14, ROOM_Y + 30, 340, 120);
        ctx.fillStyle = "#d8d0c2"; ctx.font = "11px monospace";
        const lines = [
          `BOSS: ${dbg.id}  PHASE: ${dbg.phaseId}  HP: ${dbg.health}`,
          `TIME: ${dbg.phaseTimeMs}ms  LOCKED: ${dbg.inputLocked}  DEAD: ${dbg.dead}`,
          `HAZARDS: ${dbg.activeHazards}  PHASES: ${dbg.phasesVisited}`,
        ];
        if (dbg.attacks) lines.push(`ATTACKS: ${dbg.attacks}`);
        for (let li = 0; li < lines.length; li++) ctx.fillText(lines[li], ROOM_X + 22, ROOM_Y + 48 + li * 16);
      }
      if (G.phase2Preview?.enabled) {
        for (const e of G.phase2Preview.enemies) {
          ctx.fillStyle = behaviorColor(e.behavior);
          ctx.beginPath(); ctx.arc(e.x, e.y, 11, 0, Math.PI * 2); ctx.fill();
          if (e.modifier) { ctx.strokeStyle = "#f0d477"; ctx.strokeRect(e.x - 8, e.y - 8, 16, 16); }
        }
        const debugLines = VesselGameplay.buildEncounterDebugOverlay(G.phase2Preview.enemies, 5).concat(G.phase2Preview.logs);
        ctx.fillStyle = "rgba(10,2,12,0.86)"; ctx.fillRect(ROOM_X + 14, ROOM_Y + 14, 360, 148);
        ctx.strokeStyle = "#6d4a58"; ctx.strokeRect(ROOM_X + 14, ROOM_Y + 14, 360, 148);
        ctx.fillStyle = "#dfd2be"; ctx.fillText("PHASE2 CONTRACT PREVIEW", ROOM_X + 24, ROOM_Y + 34);
        debugLines.slice(0, 7).forEach((line, idx) => ctx.fillText(line, ROOM_X + 24, ROOM_Y + 54 + idx * 16));
      }
      if (G.phase25Visuals.checklist && presentation) {
        const checklist = presentation.ANIMATION_CHECKLIST;
        const summary = presentation.summarizeReadability(G.room.enemies.filter(e => e.hp > 0));
        const rows = [
          `PLAYER ${checklist.player.join(", ")}`,
          `ENEMY ${checklist.enemy.join(", ")}`,
          `ITEM ${checklist.item.join(", ")}`,
          `BOSS ${checklist.boss.join(", ")}`,
          `SEEN P:${formatObservedStates("player")} E:${formatObservedStates("enemy")}`,
          `SEEN I:${formatObservedStates("item")} B:${formatObservedStates("boss")}`,
          `STRESS silhouettes=${summary.distinctSilhouettes} types=${summary.distinctTypes} live=${summary.total}`,
        ];
        const panelX = ROOM_X + ROOM_PX_W - PHASE25_PANEL_WIDTH - PHASE25_PANEL_MARGIN;
        const panelY = ROOM_Y + PHASE25_PANEL_MARGIN;
        ctx.fillStyle = "rgba(9,3,12,0.88)"; ctx.fillRect(panelX, panelY, PHASE25_PANEL_WIDTH, PHASE25_PANEL_HEIGHT);
        ctx.strokeStyle = "#6d4a58"; ctx.strokeRect(panelX, panelY, PHASE25_PANEL_WIDTH, PHASE25_PANEL_HEIGHT);
        ctx.fillStyle = "#dfd2be"; ctx.fillText("PHASE2.5 READABILITY CHECKLIST", panelX + 10, panelY + 20);
        rows.forEach((line, idx) => ctx.fillText(line, panelX + 10, panelY + 40 + idx * 16));
      }
      // F7 Item/Synergy debug overlay
      if (G.itemDebugOverlay) {
        const p4x = ROOM_X + 14, p4y = ROOM_Y + ROOM_PX_H - 200;
        const p4w = 400, p4h = 190;
        ctx.fillStyle = "rgba(10,2,12,0.88)"; ctx.fillRect(p4x, p4y, p4w, p4h);
        ctx.strokeStyle = "#6d4a58"; ctx.strokeRect(p4x, p4y, p4w, p4h);
        ctx.fillStyle = "#d4be6c"; ctx.font = "11px monospace";
        ctx.fillText("PHASE4 ITEM/SYNERGY OVERLAY", p4x + 10, p4y + 16);
        ctx.fillStyle = "#dfd2be";
        const dps = (G.player.damage * G.player.tears).toFixed(2);
        const corr = Math.round(G.player.corruption);
        const viable = VesselGameplay.detectDeadBuild(G.player, G.player.itemIds);
        ctx.fillText(`DPS: ${dps}  DMG: ${G.player.damage.toFixed(1)}  TEARS: ${G.player.tears.toFixed(1)}  CORR: ${corr}%`, p4x + 10, p4y + 32);
        ctx.fillText(`SOUL: ${G.player.soul.toFixed(1)}/${G.player.maxSoul}  DR: ${(G.player.damageReduction*100).toFixed(0)}%  VIABLE: ${viable.viable ? "YES" : "NO"}`, p4x + 10, p4y + 48);
        ctx.fillText(`HELD: ${G.player.itemIds.join(", ") || "none"}`, p4x + 10, p4y + 64);
        const synLines = G.player.activeSynergies.map(s => `${s.type.toUpperCase()}: ${s.name}`);
        ctx.fillStyle = synLines.length > 0 ? "#8acb8a" : "#7e6a76";
        ctx.fillText(`SYNERGIES: ${synLines.length || "none"}`, p4x + 10, p4y + 80);
        for (let si = 0; si < Math.min(synLines.length, 6); si++) {
          ctx.fillText("  " + synLines[si], p4x + 10, p4y + 96 + si * 14);
        }
        if (!viable.viable) {
          ctx.fillStyle = "#d87070";
          ctx.fillText("ISSUES: " + viable.issues.join(", "), p4x + 10, p4y + 176);
        }
        // Corruption scaling preview
        if (G.player.corruptionDamageScale || G.player.corruptionTearBonus) {
          const cb = VesselGameplay.resolveCorruptionScaling(G.player);
          ctx.fillStyle = "#c49d64";
          ctx.fillText(`CORR BONUS: +${cb.damage.toFixed(1)} dmg  +${cb.tears.toFixed(1)} tears`, p4x + 10, p4y + 160);
        }
      }
      const p=G.player;
      // Aura visual: pulsing ring around player
      if (p.aura) {
        const auraPulse = Math.sin(nowMs * 0.006) * 0.15 + 0.45;
        ctx.strokeStyle = `rgba(130,30,70,${auraPulse})`; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(p.x, p.y, 80, 0, Math.PI*2); ctx.stroke();
        ctx.strokeStyle = `rgba(90,15,50,${auraPulse * 0.5})`;
        ctx.beginPath(); ctx.arc(p.x, p.y, 60, 0, Math.PI*2); ctx.stroke();
        ctx.lineWidth = 1;
      }
      if (!(p.inv>0&&((performance.now()/50)|0)%2===0)) {
        if (usePresentation) observePhase25State("player", presentation.renderPlayer(ctx, p, nowMs));
        else {
          ctx.fillStyle=p.corruption>50?"#d0b090":"#ead9c2"; ctx.fillRect(p.x-8,p.y-12,16,24);
          ctx.fillStyle="#111"; ctx.fillRect(p.x-6,p.y-9,4,4); ctx.fillRect(p.x+2,p.y-9,4,4);
          if (p.corruption>50) { ctx.strokeStyle="rgba(10,0,12,0.65)"; ctx.beginPath(); ctx.arc(p.x,p.y,15+Math.sin(performance.now()*0.01),0,Math.PI*2); ctx.stroke(); }
        }
      }
      drawHUD();
      // --- Item tooltip popup (top-left) when near a pedestal ---
      if (G.nearbyItem && !G.nearbyItem.taken && !G.nearbyItem.hidden) {
        const tip = VesselGameplay.formatItemTooltip(G.nearbyItem.itemId);
        if (tip) {
          const panelW = 300;
          const tx = 16;
          const ty = ROOM_Y + 62;
          const lineH = 15;
          const catLabels = { offense: "OFFENSE", defense: "DEFENSE", utility: "UTILITY", economy: "ECONOMY", corruption_tech: "CORRUPTION" };
          const catColors = { offense: "#bf4b54", defense: "#5a9a5f", utility: "#5a7abf", economy: "#c9a030", corruption_tech: "#8b4abf" };
          // Word-wrap description into lines
          const maxChars = Math.floor((panelW - 20) / 7.2);
          const descLines = [];
          if (tip.desc) {
            const words = tip.desc.split(' ');
            let cur = '';
            for (const w of words) {
              if ((cur + ' ' + w).trim().length > maxChars) { descLines.push(cur); cur = w; }
              else { cur = cur ? cur + ' ' + w : w; }
            }
            if (cur) descLines.push(cur);
          }
          const totalLines = 2 + descLines.length + tip.effects.length + (tip.corruption !== 0 ? 1 : 0) + (tip.tags.length ? 1 : 0);
          const panelH = 22 + totalLines * lineH + 10;
          ctx.fillStyle = "rgba(8,2,10,0.92)"; ctx.fillRect(tx, ty, panelW, panelH);
          ctx.strokeStyle = "#5c2742"; ctx.strokeRect(tx, ty, panelW, panelH);
          let cy = ty + 18;
          ctx.fillStyle = "#e8c95e"; ctx.font = "13px monospace"; ctx.fillText(tip.name, tx + 8, cy); cy += lineH;
          ctx.fillStyle = catColors[tip.category] || "#8a6a72"; ctx.font = "10px monospace"; ctx.fillText(catLabels[tip.category] || tip.category.toUpperCase(), tx + 8, cy); cy += lineH + 2;
          ctx.fillStyle = "#9a8a78"; ctx.font = "11px monospace";
          for (const dl of descLines) { ctx.fillText(dl, tx + 8, cy); cy += lineH; }
          ctx.fillStyle = "#dfd2be"; ctx.font = "11px monospace";
          for (const eff of tip.effects) { ctx.fillText("  " + eff, tx + 8, cy); cy += lineH; }
          if (tip.corruption !== 0) {
            ctx.fillStyle = tip.corruption > 0 ? "#9f3535" : "#5a9a5f";
            ctx.fillText("  " + (tip.corruption > 0 ? "+" : "") + tip.corruption + " CORRUPTION", tx + 8, cy); cy += lineH;
          }
          if (tip.tags.length) {
            ctx.fillStyle = "#6a5a6e"; ctx.fillText("  [" + tip.tags.join(", ") + "]", tx + 8, cy);
          }
        }
      }
      // --- Map & Inventory overlay (Tab) ---
      if (G.mapOpen) {
        const ox = 60, oy = 50, ow = W - 120, oh = H - 100;
        ctx.fillStyle="rgba(5,0,8,0.92)"; ctx.fillRect(ox,oy,ow,oh);
        ctx.strokeStyle="#5c2742"; ctx.strokeRect(ox,oy,ow,oh);
        ctx.fillStyle="#d8c4ad"; ctx.font="14px monospace"; ctx.fillText("MAP",ox+20,oy+22);
        // Enhanced minimap with room-type colors and labels
        const roomTypeColors = { start:"#6d4a58", boss:"#9f3040", combat:"#6d4a58", altar:"#c9a030", confession:"#4070a0", reliquary:"#408050", rest:"#5a8a5a" };
        const roomTypeLabels = { start:"S", boss:"B", combat:"", altar:"A", confession:"?", reliquary:"R", rest:"H" };
        // Fog-of-war: only show known rooms
        const mapKnown = new Set();
        for (const r of G.dungeon.rooms) {
          if (r.visited || G.player.mapReveal) {
            mapKnown.add(r);
            if (r.doors.u) { const nr = G.dungeon.grid[r.y-1]?.[r.x]; if (nr) mapKnown.add(nr); }
            if (r.doors.d) { const nr = G.dungeon.grid[r.y+1]?.[r.x]; if (nr) mapKnown.add(nr); }
            if (r.doors.l) { const nr = G.dungeon.grid[r.y]?.[r.x-1]; if (nr) mapKnown.add(nr); }
            if (r.doors.r) { const nr = G.dungeon.grid[r.y]?.[r.x+1]; if (nr) mapKnown.add(nr); }
          }
        }
        const mapCx = ox + 130, mapCy = oy + oh/2 - 20;
        for (const r of mapKnown) {
          const rx = mapCx + (r.x-2)*38, ry = mapCy + (r.y-2)*38;
          const vis = r.visited || G.player.mapReveal;
          if (r===G.room) {
            ctx.fillStyle = "#d8b85f";
          } else if (vis) {
            ctx.fillStyle = roomTypeColors[r.type] || "#6d4a58";
          } else {
            // Discovered but unvisited: show type color dimmed
            ctx.globalAlpha = 0.35;
            ctx.fillStyle = roomTypeColors[r.type] || "#3a2a32";
          }
          ctx.fillRect(rx, ry, 28, 28);
          ctx.globalAlpha = 1.0;
          // Show labels for all known rooms (visited + discovered)
          {
            const lbl = roomTypeLabels[r.type] || "";
            if (lbl) {
              ctx.fillStyle = r===G.room ? "#1a0a08" : vis ? "#d8d0c2" : "#6a5a62";
              ctx.font = "10px monospace";
              ctx.fillText(lbl, rx + 10, ry + 18);
            }
          }
          // Draw connections
          if (vis || r === G.room) {
            ctx.strokeStyle = "#3a2030"; ctx.lineWidth = 1;
            if (r.doors.r && G.dungeon.grid[r.y]?.[r.x+1] && mapKnown.has(G.dungeon.grid[r.y][r.x+1])) { ctx.beginPath(); ctx.moveTo(rx+28,ry+14); ctx.lineTo(rx+38,ry+14); ctx.stroke(); }
            if (r.doors.d && G.dungeon.grid[r.y+1]?.[r.x] && mapKnown.has(G.dungeon.grid[r.y+1][r.x])) { ctx.beginPath(); ctx.moveTo(rx+14,ry+28); ctx.lineTo(rx+14,ry+38); ctx.stroke(); }
          }
        }
        // Inventory panel (right side)
        const invX = ox + 280, invY = oy + 10;
        ctx.fillStyle="#d8c4ad"; ctx.font="14px monospace"; ctx.fillText("INVENTORY", invX, invY + 12);
        ctx.fillStyle="#7a6a6e"; ctx.font="11px monospace";
        const invP = G.player;
        ctx.fillText(`SOUL: ${invP.soul.toFixed(1)}/${invP.maxSoul}  CORRUPTION: ${Math.round(invP.corruption)}%  DMG: ${invP.damage.toFixed(1)}  TEARS: ${invP.tears.toFixed(1)}`, invX, invY + 30);
        ctx.fillText(`SPEED: ${invP.speed.toFixed(0)}  RANGE: ${invP.range.toFixed(0)}  DR: ${(invP.damageReduction*100).toFixed(0)}%  DPS: ${(invP.damage*invP.tears).toFixed(1)}`, invX, invY + 44);
        let iy = invY + 66;
        const catColors = { offense: "#bf4b54", defense: "#5a9a5f", utility: "#5a7abf", economy: "#c9a030", corruption_tech: "#8b4abf" };
        if (invP.itemIds.length === 0) { ctx.fillStyle="#5a4a4e"; ctx.fillText("No items collected", invX, iy); }
        for (let ii = 0; ii < invP.itemIds.length && iy < oy + oh - 40; ii++) {
          const tip = VesselGameplay.formatItemTooltip(invP.itemIds[ii]);
          if (!tip) continue;
          ctx.fillStyle = catColors[tip.category] || "#8a6a72"; ctx.font = "11px monospace";
          ctx.fillText("\u25A0", invX, iy);
          ctx.fillStyle = "#e8c95e"; ctx.fillText(" " + tip.name, invX + 10, iy);
          ctx.fillStyle = "#9a8a78"; ctx.font = "10px monospace";
          const effStr = tip.effects.join(", ");
          ctx.fillText("  " + effStr, invX, iy + 13);
          iy += 30;
        }
        // Active synergies
        if (invP.activeSynergies.length > 0 && iy < oy + oh - 20) {
          ctx.fillStyle="#8acb8a"; ctx.font="12px monospace"; ctx.fillText("SYNERGIES", invX, iy + 4); iy += 18;
          for (const syn of invP.activeSynergies) {
            if (iy >= oy + oh - 10) break;
            ctx.fillStyle="#8acb8a"; ctx.font="10px monospace";
            const synDesc = syn.desc || (syn.tag ? syn.stacks + "x " + syn.tag + " tag bonus" : "");
            ctx.fillText(syn.name + (synDesc ? " — " + synDesc : ""), invX + 8, iy);
            iy += 14;
          }
        }
      }
      const optIntensity = playerOptions.get();
      if (G.flash>0 && optIntensity.flashIntensity > 0) {
        ctx.fillStyle = `rgba(180,20,20,${Math.min(0.45, G.flash * 0.45 * optIntensity.flashIntensity)})`;
        ctx.fillRect(0,0,W,H);
      }
      const v = ctx.createRadialGradient(W/2,H/2,140,W/2,H/2,470); v.addColorStop(0,"rgba(0,0,0,0)"); v.addColorStop(1,"rgba(20,0,10,0.45)");
      ctx.fillStyle=v; ctx.fillRect(0,0,W,H);
      drawPauseMenu();
      drawOptionsMenu();
    }
    function render() {
      const shakeScale = playerOptions.get().shakeIntensity;
      const sx = (Math.random()*2-1)*G.shake*6*shakeScale, sy = (Math.random()*2-1)*G.shake*6*shakeScale;
      ctx.setTransform(1,0,0,1,sx,sy); ctx.clearRect(-20,-20,W+40,H+40); ctx.imageSmoothingEnabled = false;
      if (G.state==="title") {
        ctx.fillStyle="#0a0008"; ctx.fillRect(0,0,W,H);
        ctx.fillStyle="#e7d8c3"; ctx.font="48px monospace"; ctx.fillText("VESSEL",W/2-95,H/2-40);
        ctx.font="16px monospace"; ctx.fillText("YOU DID NOT PICK UP THE DEMON.",W/2-145,H/2+4); ctx.fillText("THE DEMON PICKED UP YOU.",W/2-114,H/2+28);
        ctx.fillStyle="#c49d64"; ctx.fillText("PRESS ENTER TO DESCEND",W/2-110,H/2+78);
      } else if (G.state==="playing") drawPlaying();
      else {
        ctx.fillStyle="#060004"; ctx.fillRect(0,0,W,H); ctx.fillStyle="#d8c6b8";
        ctx.font="32px monospace"; ctx.fillText(G.state==="dead"?"THE VESSEL COLLAPSED":G.endingTitle,W/2-240,H/2-20);
        ctx.font="16px monospace"; ctx.fillText(G.state==="dead"?"Soul consumed. Press Enter to begin anew.":G.endingLine,W/2-230,H/2+16);
      }
      ctx.setTransform(1,0,0,1,0,0);
    }

    const runtime = VesselEngine.createEngineRuntime({
      fixedDt: 1 / 120,
      maxSubSteps: 8,
      update,
      render,
    });
    runtime.start();
  </script>
</body>
