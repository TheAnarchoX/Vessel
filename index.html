<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VESSEL</title>
  <style>
    body {
      margin: 0;
      background: #0a0008;
      color: #e7d8c3;
      font-family: "Courier New", monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    canvas {
      width: min(100vw, calc(100vh * 16 / 9));
      height: min(100vh, calc(100vw * 9 / 16));
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 2px solid #2c0d1c;
      box-shadow: 0 0 24px #2c0d1c;
    }
  </style>
</head>
  <body>
  <canvas id="game" width="960" height="540"></canvas>
  <script src="src/core/fixedStep.js"></script>
  <script src="src/gameplay/feelMetrics.js"></script>
  <script src="src/gameplay/enemyContracts.js"></script>
  <script src="src/engine/runtime.js"></script>
  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    ctx.imageSmoothingEnabled = false;

    const W = 960, H = 540, TILE = 48, ROOM_W = 19, ROOM_H = 11;
    const ROOM_PX_W = ROOM_W * TILE, ROOM_PX_H = ROOM_H * TILE;
    const ROOM_X = (W - ROOM_PX_W) / 2, ROOM_Y = (H - ROOM_PX_H) / 2;
    const FLOOR_NAMES = ["The Nave", "The Catacombs", "The Ossuary", "The Pit"];
    const MOVE_TUNING = { accel: 1200, friction: 7.5 };
    const SHOT_INTENT_GRACE_MS = 120;
    const HIT_STOP_MS = 45;
    const FEEL_EVAL_SHOT_INTERVAL = 4;
    const FEEL_TARGETS = { maxP95InputLatencyMs: 130, maxCadenceErrorRatio: 0.2, expectedCadenceMs: 1000 / 1.5, minSamples: 8 };

    const keys = new Set(), pressed = new Set();
    addEventListener("keydown", (e) => {
      if (!keys.has(e.code)) pressed.add(e.code);
      keys.add(e.code);
      queueShotIntent(e.code, performance.now());
      if (["Tab","F3","ArrowUp","ArrowDown","ArrowLeft","ArrowRight","KeyW","KeyA","KeyS","KeyD","KeyE"].includes(e.code)) e.preventDefault();
      initAudio();
    });
    addEventListener("keyup", (e) => keys.delete(e.code));

    let audioCtx = null;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function blip(f = 440, d = 0.08, type = "sine", g = 0.08) {
      if (!audioCtx) return;
      const o = audioCtx.createOscillator(), gain = audioCtx.createGain(), t = audioCtx.currentTime;
      o.type = type; o.frequency.value = f; gain.gain.value = g;
      o.connect(gain).connect(audioCtx.destination);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + d);
      o.start(t); o.stop(t + d);
    }
    function sfxFire(){ blip(900,0.05); }
    function sfxHit(){ blip(250,0.05,"triangle",0.05); }
    function sfxDamage(){ blip(95,0.12,"sawtooth",0.1); }
    function sfxUnlock(){ blip(120,0.2,"triangle",0.07); }
    function sfxPickup(){ [220,262,330].forEach((f,i)=>setTimeout(()=>blip(f,0.11,"triangle",0.06), i*75)); }
    function sfxBoss(){ blip(70,0.8,"sawtooth",0.08); }

    const itemPool = [
      { name: "UNHOLY WATER", corruption: 5, apply: p => p.pierce = true },
      { name: "GOAT'S EYE", corruption: 10, apply: p => p.damage += 1 },
      { name: "THE ROPE", corruption: 0, apply: p => p.extraLife += 1 },
      { name: "MARROW CANDLE", corruption: 5, apply: p => p.tears += 0.5 },
      { name: "FLAYED SKIN", corruption: 15, apply: p => p.damageReduction = 0.25 },
      { name: "BLACKENED TONGUE", corruption: 10, apply: p => p.slow = true },
      { name: "SAINT'S ASH", corruption: 0, apply: p => { p.maxSoul += 2; p.soul += 2; } },
      { name: "INVERTED CROSS", corruption: 25, apply: p => { p.damage += 1; p.soul = Math.max(1, p.soul - 1); } },
    ];

    function randomOf(a){ return a[(Math.random()*a.length)|0]; }
    function makePlayer() {
      return { x: W/2, y: H/2, vx: 0, vy: 0, accel: MOVE_TUNING.accel, friction: MOVE_TUNING.friction, r: 11, soul: 6, maxSoul: 6, corruption: 0, tears: 1.5, damage: 1, speed: 180, range: 400, shotSpeed: 320, damageReduction: 0, inv: 0, fireCd: 0, items: [], extraLife: 0, pierce: false, slow: false };
    }

    const G = {
      state: "title", floor: 0, dungeon: null, room: null, player: null, shots: [], enemyShots: [],
      msg: "", msgT: 0, mapOpen: false, flash: 0, shake: 0, endingTitle: "", endingLine: "",
      hitStop: 0, shotIntent: null, feelMetrics: VesselGameplay.createFeelMetrics(), feelFailures: [],
      phase2Preview: null
    };

    function behaviorColor(behavior) {
      return {
        chase: "#9f3f46",
        charge: "#d26c4a",
        kite: "#8b5cb1",
        summon: "#659c5f",
        zone: "#4f829f",
      }[behavior] || "#9a8896";
    }
    function ensurePhase2Preview() {
      if (G.phase2Preview || !VesselGameplay.composeEncounter) return;
      const enemies = VesselGameplay.composeEncounter({ seed: 20260303, roomIntent: "boss", wave: 5 });
      const eliteModifiers = ["faster", "armored", "cursed", "berserk"];
      eliteModifiers.forEach((modifier, i) => {
        enemies.push(VesselGameplay.createEnemyBehaviorState({
          id: `elite-${modifier}`,
          behavior: VesselGameplay.BEHAVIOR_TYPES[i % VesselGameplay.BEHAVIOR_TYPES.length],
          modifier,
          x: ROOM_X + 180 + i * 70,
          y: ROOM_Y + ROOM_PX_H - 120,
        }));
      });
      G.phase2Preview = { enabled: false, enemies, logs: [] };
    }
    function updatePhase2Preview(dt) {
      if (!G.phase2Preview || !G.phase2Preview.enabled) return;
      const target = { id: "player", x: G.player.x, y: G.player.y };
      for (const enemy of G.phase2Preview.enemies) {
        const events = VesselGameplay.updateEnemyBehavior(enemy, { dtMs: dt * 1000, target });
        for (const event of events) {
          if (!event.window) continue;
          const amount = typeof event.amount === "number" ? `:${event.amount.toFixed(2)}` : "";
          G.phase2Preview.logs.unshift(`${event.behavior}/${event.window}/${event.source}${amount}`);
        }
      }
      G.phase2Preview.logs.length = Math.min(8, G.phase2Preview.logs.length);
    }

    function dirForKey(code) {
      if (code === "ArrowUp") return { sx: 0, sy: -1 };
      if (code === "ArrowDown") return { sx: 0, sy: 1 };
      if (code === "ArrowLeft") return { sx: -1, sy: 0 };
      if (code === "ArrowRight") return { sx: 1, sy: 0 };
      return null;
    }
    function queueShotIntent(code, nowMs) {
      const dir = dirForKey(code);
      if (!dir) return;
      G.shotIntent = { ...dir, at: nowMs };
    }
    function currentAimDirection() {
      if (keys.has("ArrowUp")) return dirForKey("ArrowUp");
      if (keys.has("ArrowDown")) return dirForKey("ArrowDown");
      if (keys.has("ArrowLeft")) return dirForKey("ArrowLeft");
      if (keys.has("ArrowRight")) return dirForKey("ArrowRight");
      return null;
    }
    function readHeldAim(nowMs) {
      const aim = currentAimDirection();
      if (aim && !G.shotIntent) G.shotIntent = { ...aim, at: nowMs };
    }
    function isIntentHeld(intent) {
      const aim = currentAimDirection();
      return !!aim && aim.sx === intent.sx && aim.sy === intent.sy;
    }
    function firePlayerShot(intent, nowMs) {
      const p = G.player;
      p.fireCd = 1 / p.tears; sfxFire();
      G.shots.push({x:p.x,y:p.y,vx:intent.sx*p.shotSpeed,vy:intent.sy*p.shotSpeed,life:p.range/p.shotSpeed,damage:p.damage,pierce:p.pierce,slow:p.slow,color:tearColor()});
      VesselGameplay.recordShot(G.feelMetrics, nowMs, intent.at, 1000 / p.tears);
      if ((G.feelMetrics.shotLatenciesMs.length % FEEL_EVAL_SHOT_INTERVAL) === 0) {
        const summary = VesselGameplay.summarizeFeel(G.feelMetrics);
        G.feelFailures = VesselGameplay.evaluateFeel(summary, FEEL_TARGETS);
      }
      G.shotIntent = isIntentHeld(intent) ? { sx: intent.sx, sy: intent.sy, at: nowMs } : null;
    }

    function createDungeon(floor) {
      const grid = Array.from({length: 5}, () => Array(5).fill(null));
      const rooms = [];
      const start = {x:2,y:2};
      const edges = [];
      for (let i=0;i<5;i++) edges.push({x:i,y:0},{x:i,y:4},{x:0,y:i},{x:4,y:i});
      const boss = randomOf(edges.filter(e => Math.abs(e.x-2)+Math.abs(e.y-2) >= 3));
      const setRoom = (x,y,type) => {
        if (!grid[y][x]) {
          const r = { x,y,type,spawned:false,cleared:type!=="combat"&&type!=="boss",visited:false,doors:{u:false,d:false,l:false,r:false},enemies:[],pickups:[],choiceDone:false };
          grid[y][x] = r; rooms.push(r);
        }
        return grid[y][x];
      };
      setRoom(start.x,start.y,"start");
      setRoom(boss.x,boss.y,"boss");
      let cx=2, cy=2;
      while (cx!==boss.x || cy!==boss.y) {
        if (Math.random()<0.5 && cx!==boss.x) cx += Math.sign(boss.x-cx);
        else if (cy!==boss.y) cy += Math.sign(boss.y-cy);
        if (!(cx===boss.x&&cy===boss.y)) setRoom(cx,cy,"combat");
      }
      const adj = [[1,0],[-1,0],[0,1],[0,-1]].map(([dx,dy])=>({x:2+dx,y:2+dy})).filter(p=>p.x>=0&&p.x<5&&p.y>=0&&p.y<5);
      const altar = randomOf(adj.filter(p=>!(p.x===boss.x&&p.y===boss.y)));
      setRoom(altar.x,altar.y,"altar");
      const target = floor===0 ? 5 : floor===1 ? 6 : floor===2 ? 7 : 2;
      while (rooms.length < target) {
        const base = randomOf(rooms), [dx,dy] = randomOf([[1,0],[-1,0],[0,1],[0,-1]]);
        const nx = base.x+dx, ny = base.y+dy;
        if (nx>=0&&nx<5&&ny>=0&&ny<5&&!grid[ny][nx]) setRoom(nx,ny,"combat");
      }
      const combats = rooms.filter(r => r.type==="combat");
      if (combats.length && floor>0) randomOf(combats).type = "confession";
      const rest = rooms.filter(r => r.type==="combat");
      if (rest.length) randomOf(rest).type = "reliquary";
      for (const r of rooms) {
        if (grid[r.y-1]?.[r.x]) r.doors.u = true;
        if (grid[r.y+1]?.[r.x]) r.doors.d = true;
        if (grid[r.y]?.[r.x-1]) r.doors.l = true;
        if (grid[r.y]?.[r.x+1]) r.doors.r = true;
      }
      return {grid, rooms, start};
    }

    function spawnEnemy(type, x, y) {
      const stat = {
        penitent:[2,60,0.5,"#89272d"], hollowed:[3,75,1,"#c7b39e"], wisp:[2,0,0.5,"#805ca0"],
        bonecrawler:[3,110,1,"#bcbaaa"], revenant:[6,55,1.5,"#7c7c7c"], plague:[4,50,1,"#4f7f45"],
        seraph:[5,85,1,"#ca8054"], choir:[3,65,1,"#8d5ca8"], tendril:[8,0,2,"#120814"],
        shepherd:[36,64,1,"#6a3a2b"], pit:[58,88,1.5,"#170812"]
      }[type];
      return { type, x, y, r: (type==="shepherd"||type==="pit")?36:(type==="tendril"?22:14), hp: stat[0], maxHp: stat[0], speed: stat[1], damage: stat[2], color: stat[3], cd: Math.random()*1.5, phase: 1, slowT: 0, split:false, delay:[] };
    }
    function enemyTypeForFloor() {
      if (G.floor===0) return randomOf(["penitent","hollowed","wisp"]);
      if (G.floor===1) return randomOf(["bonecrawler","revenant","plague"]);
      if (G.floor===2) return randomOf(["seraph","choir","tendril"]);
      return randomOf(["seraph","hollowed","penitent"]);
    }

    function enterRoom() {
      G.room.visited = true; G.shots = []; G.enemyShots = [];
      if (!G.room.spawned) {
        G.room.spawned = true;
        if (G.room.type==="combat") for (let i=0;i<2+G.floor;i++) G.room.enemies.push(spawnEnemy(enemyTypeForFloor(), ROOM_X+130+Math.random()*(ROOM_PX_W-260), ROOM_Y+120+Math.random()*(ROOM_PX_H-240)));
        if (G.room.type==="boss") { G.room.enemies.push(spawnEnemy(G.floor===3?"pit":"shepherd",W/2,H/2-40)); sfxBoss(); }
        if (G.room.type==="altar") {
          const a = randomOf(itemPool), b = randomOf(itemPool.filter(i=>i!==a));
          G.room.pickups = [{x:W/2-90,y:H/2,item:a},{x:W/2+90,y:H/2,item:b}];
        }
        if (G.room.type==="reliquary") G.room.pickups = [{x:ROOM_X+ROOM_PX_W-110,y:H/2,item:randomOf(itemPool),hidden:true}];
      }
    }
    function roomLocked(){ return !G.room.cleared && (G.room.type==="combat"||G.room.type==="boss"); }
    function setMsg(text, t=2){ G.msg = text; G.msgT = t; }
    function applyItem(item){
      G.player.items.push(item.name); item.apply(G.player);
      G.player.corruption = Math.min(100, G.player.corruption + item.corruption);
      setMsg(item.name, 2.5); sfxPickup();
    }
    function startRun() {
      G.floor = 0; G.player = makePlayer();
      ensurePhase2Preview();
      loadFloor(true);
      setMsg("DESCEND INTO THE NAVE", 2.5);
      G.state = "playing";
    }
    function loadFloor(first=false){
      G.dungeon = createDungeon(G.floor);
      G.room = G.dungeon.grid[G.dungeon.start.y][G.dungeon.start.x];
      G.player.x = W/2; G.player.y = H/2;
      enterRoom();
      if (!first) setMsg(FLOOR_NAMES[G.floor].toUpperCase(), 2);
    }
    function transition(dir){
      if (roomLocked()) return;
      const nx = G.room.x + (dir==="r") - (dir==="l"), ny = G.room.y + (dir==="d") - (dir==="u");
      const next = G.dungeon.grid[ny]?.[nx]; if (!next) return;
      G.room = next;
      if (dir==="l") G.player.x = ROOM_X+ROOM_PX_W-TILE*1.6;
      if (dir==="r") G.player.x = ROOM_X+TILE*1.6;
      if (dir==="u") G.player.y = ROOM_Y+ROOM_PX_H-TILE*1.6;
      if (dir==="d") G.player.y = ROOM_Y+TILE*1.6;
      enterRoom();
    }

    function tearColor() {
      const c = G.player.corruption;
      if (c>=76) return "#160007";
      if (c>=51) return "#a31919";
      if (c>=26) return "#d2ba49";
      return "#efe5d2";
    }
    function damagePlayer(d){
      const p = G.player; if (p.inv>0) return;
      p.inv = 1; p.soul -= d*(1-p.damageReduction); G.flash = 0.8; G.shake = 0.8; sfxDamage();
      if (p.soul<=0) {
        if (p.extraLife>0) { p.extraLife--; p.soul = 1; setMsg("THE ROPE TIGHTENS",2); }
        else G.state = "dead";
      }
    }

    function updatePlaying(dt){
      const p = G.player;
      if (pressed.has("Tab")) G.mapOpen = !G.mapOpen;
      if (pressed.has("F3")) { ensurePhase2Preview(); if (G.phase2Preview) G.phase2Preview.enabled = !G.phase2Preview.enabled; }
      // Hit-stop deliberately freezes gameplay updates for a short readability pulse.
      // This includes player timers (invulnerability/fire cooldown) for a true micro-freeze.
      if (G.hitStop > 0) { G.hitStop = Math.max(0, G.hitStop - dt); return; }
      p.inv = Math.max(0,p.inv-dt); p.fireCd -= dt;
      let mx=(keys.has("KeyD")?1:0)-(keys.has("KeyA")?1:0), my=(keys.has("KeyS")?1:0)-(keys.has("KeyW")?1:0);
      const ml=Math.hypot(mx,my)||1; mx/=ml; my/=ml;
      p.vx += mx * p.accel * dt; p.vy += my * p.accel * dt;
      const drag = Math.max(0, 1 - p.friction * dt);
      p.vx *= drag; p.vy *= drag;
      const speed = Math.hypot(p.vx, p.vy);
      if (speed > p.speed) { p.vx = (p.vx / speed) * p.speed; p.vy = (p.vy / speed) * p.speed; }
      p.x += p.vx * dt; p.y += p.vy * dt;
      const l=ROOM_X+TILE, r=ROOM_X+ROOM_PX_W-TILE, t=ROOM_Y+TILE, b=ROOM_Y+ROOM_PX_H-TILE;
      if (p.x<l){ if(G.room.doors.l&&Math.abs(p.y-H/2)<70&&p.x<ROOM_X+8) transition("l"); p.x=l; }
      if (p.x>r){ if(G.room.doors.r&&Math.abs(p.y-H/2)<70&&p.x>ROOM_X+ROOM_PX_W-8) transition("r"); p.x=r; }
      if (p.y<t){ if(G.room.doors.u&&Math.abs(p.x-W/2)<70&&p.y<ROOM_Y+8) transition("u"); p.y=t; }
      if (p.y>b){ if(G.room.doors.d&&Math.abs(p.x-W/2)<70&&p.y>ROOM_Y+ROOM_PX_H-8) transition("d"); p.y=b; }
      const nowMs = performance.now();
      readHeldAim(nowMs);
      if (G.shotIntent && (nowMs - G.shotIntent.at) > SHOT_INTENT_GRACE_MS) G.shotIntent = null;
      if (G.shotIntent && p.fireCd<=0) firePlayerShot(G.shotIntent, nowMs);

      for (const arr of [G.shots,G.enemyShots]) for (let i=arr.length-1;i>=0;i--) {
        const s=arr[i]; s.x+=s.vx*dt; s.y+=s.vy*dt; s.life-=dt;
        if (s.x<l||s.x>r||s.y<t||s.y>b||s.life<=0) arr.splice(i,1);
      }
      for (let i=G.enemyShots.length-1;i>=0;i--) if (Math.hypot(G.enemyShots[i].x-p.x,G.enemyShots[i].y-p.y)<p.r+5) { damagePlayer(G.enemyShots[i].damage||0.5); G.enemyShots.splice(i,1); }

      for (let i=G.shots.length-1;i>=0;i--) {
        const s=G.shots[i];
        for (const e of G.room.enemies) if (e.hp>0 && Math.hypot(s.x-e.x,s.y-e.y)<e.r+5) {
          e.hp-=s.damage; if (s.slow) e.slowT=0.7; sfxHit();
          G.hitStop = Math.max(G.hitStop, HIT_STOP_MS / 1000);
          VesselGameplay.recordHitstop(G.feelMetrics, HIT_STOP_MS);
          if (!s.pierce) { G.shots.splice(i,1); break; }
        }
      }

      const es = G.room.enemies;
      for (const e of es) {
        if (e.hp<=0) continue;
        e.cd -= dt; e.slowT = Math.max(0,e.slowT-dt);
        const sp = e.speed*(e.slowT?0.5:1), dx=p.x-e.x, dy=p.y-e.y, d=Math.hypot(dx,dy)||1;
        if (["penitent","bonecrawler","plague","choir"].includes(e.type)) {
          const z = e.type==="bonecrawler" ? Math.sin(performance.now()*0.01 + e.x*0.01)*0.8 : 0;
          e.x += ((dx/d)+z)*sp*dt; e.y += ((dy/d)-z)*sp*dt;
        } else if (["hollowed","revenant"].includes(e.type)) {
          if (e.cd<=0) { e.cd=1.3; e.vx=dx/d; e.vy=dy/d; e.charge=0.5; }
          if (e.charge>0) { e.charge-=dt; e.x+=e.vx*sp*2.2*dt; e.y+=e.vy*sp*2.2*dt; }
        } else if (["wisp","seraph"].includes(e.type)) {
          e.a=(e.a||Math.random()*6.28)+dt*1.6; const orbit=e.type==="seraph"?130:95;
          e.x=p.x+Math.cos(e.a)*orbit; e.y=p.y+Math.sin(e.a)*orbit;
          if (e.cd<=0) { e.cd=e.type==="seraph"?0.9:1.2; G.enemyShots.push({x:e.x,y:e.y,vx:(dx/d)*180,vy:(dy/d)*180,life:2.5,color:"#a33",damage:e.damage}); }
        } else if (e.type==="tendril") {
          if (e.cd<=0 && d<68) { damagePlayer(e.damage); e.cd=1.2; }
        } else if (e.type==="shepherd") {
          if (e.hp<e.maxHp/2) e.phase=2;
          e.x += (dx/d)*sp*(e.phase===2?1.5:1)*dt; e.y += (dy/d)*sp*(e.phase===2?1.5:1)*dt;
          if (e.cd<=0) {
            e.cd = 1.7;
            if (e.phase===1) for (let i=0;i<2;i++) es.push(spawnEnemy("penitent",e.x+Math.random()*60-30,e.y+Math.random()*60-30));
            else for (let i=0;i<8;i++) { const a=i*Math.PI/4; G.enemyShots.push({x:e.x,y:e.y,vx:Math.cos(a)*170,vy:Math.sin(a)*170,life:2,color:"#912",damage:0.8}); }
          }
        } else if (e.type==="pit") {
          if (e.hp<e.maxHp*0.66) e.phase=2; if (e.hp<e.maxHp*0.33) e.phase=3;
          e.delay.push({x:p.x,y:p.y}); if (e.delay.length>20) { const m=e.delay.shift(); e.x += (m.x-e.x)*0.08; e.y += (m.y-e.y)*0.08; }
          if (e.cd<=0) { e.cd=e.phase===1?1.3:0.75; G.enemyShots.push({x:e.x,y:e.y,vx:(dx/d)*210,vy:(dy/d)*210,life:2,color:tearColor(),damage:1}); }
          if (e.phase===3) { p.x=Math.min(Math.max(p.x,ROOM_X+TILE*2),ROOM_X+ROOM_PX_W-TILE*2); p.y=Math.min(Math.max(p.y,ROOM_Y+TILE*2),ROOM_Y+ROOM_PX_H-TILE*2); }
        }
        e.x=Math.max(l+e.r,Math.min(r-e.r,e.x)); e.y=Math.max(t+e.r,Math.min(b-e.r,e.y));
        if (!["wisp","seraph"].includes(e.type) && Math.hypot(e.x-p.x,e.y-p.y)<e.r+p.r) damagePlayer(e.damage);
        if (e.hp<=0 && e.type==="plague" && !e.split) { e.split=true; for (let k=0;k<3;k++) es.push(spawnEnemy("penitent",e.x+Math.random()*40-20,e.y+Math.random()*40-20)); }
      }

      if (!G.room.cleared && G.room.enemies.length && G.room.enemies.every(e=>e.hp<=0)) {
        G.room.cleared = true; sfxUnlock(); setMsg("ROOM PURGED",1.5);
        if (G.room.type==="boss") {
          if (G.floor===3) {
            const c=p.corruption; G.state="ending";
            G.endingTitle = c<50 ? "ENDING A — EXORCISM" : "ENDING B — SACRIFICE";
            G.endingLine = c<50 ? "You cast it out. You are empty now. That might be okay." : "You won. The vessel remains. Something wears it home.";
          } else {
            if (G.floor===0) applyItem({name:"SHEPHERD'S BRAND",corruption:8,apply:pl=>pl.homing=true});
            if (G.floor===1) applyItem({name:"SAINT'S MARROW",corruption:10,apply:pl=>pl.damage+=1});
            if (G.floor===2) applyItem({name:"TESTAMENT",corruption:5,apply:pl=>{pl.tears+=0.5;pl.mapReveal=true;}});
            G.floor++; loadFloor();
          }
        }
      }

      if (pressed.has("KeyE")) {
        if (G.room.type==="altar") {
          for (const pck of G.room.pickups) if (Math.hypot(p.x-pck.x,p.y-pck.y)<46) { applyItem(pck.item); G.player.soul=Math.max(1,G.player.soul-0.5); G.room.pickups=[]; break; }
        }
        if (G.room.type==="reliquary" && G.room.pickups[0]) {
          const pck=G.room.pickups[0], reveal = p.x>ROOM_X+ROOM_PX_W-TILE*2.5 && Math.abs(p.y-H/2)<64;
          if (reveal) pck.hidden=false;
          if (!pck.hidden && Math.hypot(p.x-pck.x,p.y-pck.y)<46) { applyItem(pck.item); G.room.pickups=[]; }
        }
        if (G.room.type==="confession" && !G.room.choiceDone) {
          if (p.x < W/2) { p.damage += 1; p.soul = Math.max(1,p.soul-1); }
          else { p.maxSoul += 2; p.soul += 2; p.corruption = Math.min(100,p.corruption+15); }
          G.room.choiceDone = true; G.room.cleared = true; setMsg("THE CONFESSION IS ACCEPTED",2);
        }
      }

      if (p.corruption>=100 && G.floor===3 && G.room.type==="boss") {
        G.state = "ending";
        G.endingTitle = "ENDING C — CONSUMED";
        G.endingLine = "There was no player. There was only ever the vessel.";
      }
      updatePhase2Preview(dt);
    }

    function update(dt){
      if (G.state==="title") { if (pressed.has("Enter")) startRun(); }
      else if (G.state==="playing") updatePlaying(dt);
      else if ((G.state==="dead"||G.state==="ending") && pressed.has("Enter")) G.state="title";
      G.msgT = Math.max(0, G.msgT-dt); G.flash = Math.max(0,G.flash-dt*2.5); G.shake = Math.max(0,G.shake-dt*8); pressed.clear();
    }

    function drawRoom() {
      const palette = [
        {floor:"#14000f",wall:"#300b19",alt:"#22030e"},
        {floor:"#120b07",wall:"#2d1e13",alt:"#1f140e"},
        {floor:"#0d0a10",wall:"#1f1427",alt:"#17101f"},
        {floor:"#090006",wall:"#25001d",alt:"#160010"}
      ][G.floor];
      ctx.fillStyle = palette.floor; ctx.fillRect(ROOM_X,ROOM_Y,ROOM_PX_W,ROOM_PX_H);
      for (let y=1;y<ROOM_H-1;y++) for (let x=1;x<ROOM_W-1;x++) {
        ctx.fillStyle = ((x+y)&1)?palette.floor:palette.alt;
        ctx.fillRect(ROOM_X+x*TILE,ROOM_Y+y*TILE,TILE,TILE);
      }
      ctx.fillStyle = palette.wall;
      ctx.fillRect(ROOM_X,ROOM_Y,ROOM_PX_W,TILE); ctx.fillRect(ROOM_X,ROOM_Y+ROOM_PX_H-TILE,ROOM_PX_W,TILE);
      ctx.fillRect(ROOM_X,ROOM_Y,TILE,ROOM_PX_H); ctx.fillRect(ROOM_X+ROOM_PX_W-TILE,ROOM_Y,TILE,ROOM_PX_H);
      const d = (x,y,w,h)=>{ ctx.fillStyle = roomLocked() ? "#17070f" : "#422738"; ctx.fillRect(x,y,w,h); };
      if (G.room.doors.u) d(W/2-56,ROOM_Y,112,TILE);
      if (G.room.doors.d) d(W/2-56,ROOM_Y+ROOM_PX_H-TILE,112,TILE);
      if (G.room.doors.l) d(ROOM_X,H/2-56,TILE,112);
      if (G.room.doors.r) d(ROOM_X+ROOM_PX_W-TILE,H/2-56,TILE,112);
    }
    function drawHUD() {
      const p = G.player;
      ctx.fillStyle="#12000f"; ctx.fillRect(0,0,W,58); ctx.fillRect(0,H-56,W,56);
      ctx.strokeStyle="#3a1328"; ctx.strokeRect(4,4,W-8,50); ctx.strokeRect(4,H-52,W-8,48);
      ctx.fillStyle="#e6d8cc"; ctx.font="16px monospace";
      ctx.fillText("SOUL:",16,26);
      const pulse = 1 + Math.sin(performance.now()*0.008)*0.08;
      for (let i=0;i<Math.ceil(p.maxSoul);i++) { const f=i+1<=p.soul; ctx.fillStyle=f?"#d54a58":"#3a1f24"; const z=f&&p.soul<=2?10*pulse:10; ctx.fillRect(72+i*15,18,z,z); }
      ctx.fillStyle="#c9b65d"; ctx.fillText("VESSEL",W/2-30,26);
      ctx.fillStyle="#e6d8cc"; ctx.fillText(`CORRUPTION: ${Math.round(p.corruption)}%`,W-248,18);
      ctx.fillStyle="#281118"; ctx.fillRect(W-248,26,180,12);
      ctx.fillStyle=p.corruption<50?"#b5a54a":p.corruption<75?"#9f3535":"#290b18"; ctx.fillRect(W-248,26,180*Math.min(1,p.corruption/100),12);
      ctx.fillStyle="#d8d0c2"; ctx.fillText(`ACTIVE: NONE`,16,H-28); ctx.fillText(`FLOOR: ${FLOOR_NAMES[G.floor]}`,W-225,H-28);
      ctx.fillText("ITEMS: "+(p.items.slice(-4).join(" | ")||"NONE"),16,H-10);
      ctx.fillStyle = G.phase2Preview?.enabled ? "#d4be6c" : "#7e6a76";
      ctx.fillText(`F3 PHASE2 PREVIEW ${G.phase2Preview?.enabled ? "ON" : "OFF"}`,W/2-98,26);
      const feelSummary = VesselGameplay.summarizeFeel(G.feelMetrics);
      ctx.fillStyle = G.feelFailures.length ? "#d87070" : "#8acb8a";
      ctx.fillText(`FEEL ${G.feelFailures.length ? "REGRESSED" : "OK"} L95:${feelSummary.latencyP95Ms.toFixed(0)}ms`,W/2-130,H-28);
      const mx=W-145,my=H-49;
      for (const r of G.dungeon.rooms) { const x=mx+(r.x-2)*14,y=my+(r.y-2)*14; ctx.fillStyle=r===G.room?"#f0d477":(r.visited||p.mapReveal?"#8b6d7c":"#291723"); ctx.fillRect(x,y,10,10); }
      if (G.msgT>0) { ctx.fillStyle="#f0dfbf"; ctx.fillText(G.msg,W/2-ctx.measureText(G.msg).width/2,50); }
    }
    function drawPlaying() {
      drawRoom();
      for (const p of G.room.pickups) {
        if (p.hidden) continue;
        ctx.fillStyle="#2d1f12"; ctx.fillRect(p.x-14,p.y+8,28,8);
        ctx.fillStyle="#f2e4bf"; ctx.fillRect(p.x-10,p.y-18,20,28);
        if (p.item) { ctx.fillStyle="#e8c95e"; ctx.fillText(p.item.name,p.x-60,p.y-24); }
      }
      for (const s of G.shots) { ctx.fillStyle=s.color; ctx.fillRect(s.x-4,s.y-4,8,8); }
      for (const s of G.enemyShots) { ctx.fillStyle=s.color||"#a33"; ctx.fillRect(s.x-4,s.y-4,8,8); }
      for (const e of G.room.enemies) if (e.hp>0) {
        ctx.fillStyle=e.color;
        if (["wisp","seraph"].includes(e.type)) { ctx.beginPath(); ctx.arc(e.x,e.y,e.r,0,Math.PI*2); ctx.fill(); }
        else if (e.type==="tendril") ctx.fillRect(e.x-8,e.y-20,16,40);
        else ctx.fillRect(e.x-e.r*0.6,e.y-e.r*0.7,e.r*1.2,e.r*1.4);
        if (e.type==="shepherd"||e.type==="pit") {
          ctx.fillStyle="#2a0010"; ctx.fillRect(W/2-140,ROOM_Y+10,280,10);
          ctx.fillStyle="#bf4b54"; ctx.fillRect(W/2-140,ROOM_Y+10,280*Math.max(0,e.hp/e.maxHp),10);
        }
      }
      if (G.phase2Preview?.enabled) {
        for (const e of G.phase2Preview.enemies) {
          ctx.fillStyle = behaviorColor(e.behavior);
          ctx.beginPath(); ctx.arc(e.x, e.y, 11, 0, Math.PI * 2); ctx.fill();
          if (e.modifier) { ctx.strokeStyle = "#f0d477"; ctx.strokeRect(e.x - 8, e.y - 8, 16, 16); }
        }
        const debugLines = VesselGameplay.buildEncounterDebugOverlay(G.phase2Preview.enemies, 5).concat(G.phase2Preview.logs);
        ctx.fillStyle = "rgba(10,2,12,0.86)"; ctx.fillRect(ROOM_X + 14, ROOM_Y + 14, 360, 148);
        ctx.strokeStyle = "#6d4a58"; ctx.strokeRect(ROOM_X + 14, ROOM_Y + 14, 360, 148);
        ctx.fillStyle = "#dfd2be"; ctx.fillText("PHASE2 CONTRACT PREVIEW", ROOM_X + 24, ROOM_Y + 34);
        debugLines.slice(0, 7).forEach((line, idx) => ctx.fillText(line, ROOM_X + 24, ROOM_Y + 54 + idx * 16));
      }
      const p=G.player;
      if (!(p.inv>0&&((performance.now()/50)|0)%2===0)) {
        ctx.fillStyle=p.corruption>50?"#d0b090":"#ead9c2"; ctx.fillRect(p.x-8,p.y-12,16,24);
        ctx.fillStyle="#111"; ctx.fillRect(p.x-6,p.y-9,4,4); ctx.fillRect(p.x+2,p.y-9,4,4);
        if (p.corruption>50) { ctx.strokeStyle="rgba(10,0,12,0.65)"; ctx.beginPath(); ctx.arc(p.x,p.y,15+Math.sin(performance.now()*0.01),0,Math.PI*2); ctx.stroke(); }
      }
      drawHUD();
      if (G.mapOpen) {
        ctx.fillStyle="rgba(5,0,8,0.86)"; ctx.fillRect(90,70,W-180,H-140);
        ctx.strokeStyle="#5c2742"; ctx.strokeRect(90,70,W-180,H-140);
        ctx.fillStyle="#d8c4ad"; ctx.fillText("MAP & INVENTORY",W/2-80,100);
        for (const r of G.dungeon.rooms) {
          const x=W/2-100+(r.x-2)*40,y=H/2-80+(r.y-2)*40;
          ctx.fillStyle=r===G.room?"#d8b85f":(r.visited||G.player.mapReveal?"#6d4a58":"#1f131b"); ctx.fillRect(x,y,30,30);
        }
      }
      if (G.flash>0) { ctx.fillStyle=`rgba(180,20,20,${Math.min(0.45,G.flash*0.45)})`; ctx.fillRect(0,0,W,H); }
      const v = ctx.createRadialGradient(W/2,H/2,140,W/2,H/2,470); v.addColorStop(0,"rgba(0,0,0,0)"); v.addColorStop(1,"rgba(20,0,10,0.45)");
      ctx.fillStyle=v; ctx.fillRect(0,0,W,H);
    }
    function render() {
      const sx = (Math.random()*2-1)*G.shake*6, sy = (Math.random()*2-1)*G.shake*6;
      ctx.setTransform(1,0,0,1,sx,sy); ctx.clearRect(-20,-20,W+40,H+40); ctx.imageSmoothingEnabled = false;
      if (G.state==="title") {
        ctx.fillStyle="#0a0008"; ctx.fillRect(0,0,W,H);
        ctx.fillStyle="#e7d8c3"; ctx.font="48px monospace"; ctx.fillText("VESSEL",W/2-95,H/2-40);
        ctx.font="16px monospace"; ctx.fillText("YOU DID NOT PICK UP THE DEMON.",W/2-145,H/2+4); ctx.fillText("THE DEMON PICKED UP YOU.",W/2-114,H/2+28);
        ctx.fillStyle="#c49d64"; ctx.fillText("PRESS ENTER TO DESCEND",W/2-110,H/2+78);
      } else if (G.state==="playing") drawPlaying();
      else {
        ctx.fillStyle="#060004"; ctx.fillRect(0,0,W,H); ctx.fillStyle="#d8c6b8";
        ctx.font="32px monospace"; ctx.fillText(G.state==="dead"?"THE VESSEL COLLAPSED":G.endingTitle,W/2-240,H/2-20);
        ctx.font="16px monospace"; ctx.fillText(G.state==="dead"?"Soul consumed. Press Enter to begin anew.":G.endingLine,W/2-230,H/2+16);
      }
      ctx.setTransform(1,0,0,1,0,0);
    }

    const runtime = VesselEngine.createEngineRuntime({
      fixedDt: 1 / 120,
      maxSubSteps: 8,
      update,
      render,
    });
    runtime.start();
  </script>
</body>
